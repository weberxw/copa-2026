<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <title>Copa do Mundo 2026</title>
  <style>
    :root {
      --bg: #f1f4fb;
      --surface: #ffffff;
      --surface-2: #f5f7fc;
      --border: #d7dcec;
      --text: #1d2748;
      --muted: #6b75a3;
      --accent: #3a59cf;
      --accent-2: #16a86d;
      --warn: #d9852b;
      --danger: #c93151;
      --shadow: 0 6px 20px rgba(31, 45, 96, 0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(1200px 600px at 10% -10%, #dde6fa 0%, transparent 60%),
                  radial-gradient(900px 500px at 110% 10%, #e6ecfb 0%, transparent 60%),
                  var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 28px 24px 8px;
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 26px; letter-spacing: 0.2px; }
    header .sub { color: var(--muted); font-size: 14px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    button, .btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s, border-color .15s, transform .05s;
    }
    button:hover { background: #eaeffb; border-color: #b8c3e3; }
    button:active { transform: translateY(1px); }
    button.danger { color: var(--danger); border-color: #efc4cf; }

    main { max-width: 1500px; margin: 0 auto; padding: 16px 24px 48px; }

    .phase-title {
      font-size: 14px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 28px 4px 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
    }

    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
      box-shadow: var(--shadow);
    }
    .group h2 {
      margin: 0 0 10px;
      font-size: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .group h2 .pill {
      background: var(--surface-2);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    table.standings, table.third-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.standings th, table.standings td,
    table.third-table th, table.third-table td {
      text-align: center;
      padding: 6px 4px;
      border-bottom: 1px dashed #e0e5f2;
    }
    table.standings th, table.third-table th {
      color: var(--muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    table.standings td.team, table.third-table td.team {
      text-align: left;
      font-weight: 500;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table.standings td.pts, table.third-table td.pts {
      font-weight: 700;
      color: var(--accent);
    }
    .flag {
      display: inline-block;
      margin-right: 6px;
      font-size: 15px;
      line-height: 1;
      vertical-align: -1px;
    }

    table.standings tr.qualified td,
    table.third-table tr.qualified td { background: #e7f3ed; }
    table.third-table tr.cutoff td {
      border-bottom: 2px solid var(--accent-2);
    }
    table.third-table .pos { color: var(--muted); font-size: 11px; width: 28px; }
    table.third-table .grp { color: var(--muted); font-size: 11px; width: 28px; }

    .matches { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .match-row { display: flex; flex-direction: column; gap: 2px; }
    .match-time {
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.3px;
      padding-left: 2px;
    }
    .match {
      display: grid;
      grid-template-columns: 1fr 40px auto 40px 1fr;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 8px;
    }
    .match .home, .match .away { color: var(--text); }
    .match .home { text-align: right; }
    .match .away { text-align: left; }
    .match .team-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .match input[type="number"],
    .ko-match input[type="number"] {
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 4px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      -moz-appearance: textfield;
    }
    .match input[type="number"] { width: 40px; }
    .ko-match input[type="number"] { width: 38px; }
    .match input[type="number"]::-webkit-outer-spin-button,
    .match input[type="number"]::-webkit-inner-spin-button,
    .ko-match input[type="number"]::-webkit-outer-spin-button,
    .ko-match input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .match input:focus, .ko-match input:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
    }
    .match .vs { color: var(--muted); font-size: 11px; text-align: center; }

    /* Bracket */
    .bracket {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .bracket-round h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.9px;
      font-weight: 600;
    }
    .bracket-round .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }

    /* Final + trophy */
    .bracket-round.final-round .matches-grid {
      grid-template-columns: minmax(280px, 480px);
      justify-content: center;
    }
    .champion {
      margin-top: 20px;
      padding: 26px 24px;
      background: linear-gradient(180deg, #fff9e3, #fdedb6);
      border: 2px solid #ecc15a;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 14px 32px rgba(236, 193, 90, 0.28);
    }
    .champion .trophy {
      font-size: 56px;
      line-height: 1;
      filter: drop-shadow(0 6px 8px rgba(180, 130, 30, 0.35));
    }
    .champion-label {
      margin-top: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8a6300;
      font-weight: 700;
    }
    .champion-team {
      margin-top: 6px;
      font-size: 26px;
      font-weight: 700;
      color: #4f3700;
    }
    .champion-team .flag {
      font-size: 28px;
      margin-right: 10px;
      vertical-align: -3px;
    }
    .ko-match {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 13px;
      box-shadow: var(--shadow);
    }
    .ko-match .ko-id {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .ko-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }
    .ko-row .team-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ko-row.winner .team-label { color: var(--accent-2); font-weight: 600; }
    .ko-row.placeholder .team-label { color: var(--muted); font-style: italic; }
    .ko-pens {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .ko-pens input[type="number"] {
      width: 32px !important;
      padding: 3px 2px !important;
      font-size: 12px !important;
    }
    .ko-pens .vs { color: var(--muted); font-size: 11px; }

    .status {
      position: fixed;
      right: 16px; bottom: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    .status.show { opacity: 1; }

  </style>
</head>

      { id: 90, home: "W74", away: "W77" },
      { id: 91, home: "W76", away: "W78" },
      { id: 92, home: "W79", away: "W80" },
      { id: 93, home: "W83", away: "W84" },
      { id: 94, home: "W81", away: "W82" },
      { id: 95, home: "W86", away: "W88" },
      { id: 96, home: "W85", away: "W87" },
    ];

    const KO_QF = [
      { id: 97, home: "W89", away: "W90" },
      { id: 98, home: "W93", away: "W94" },
      { id: 99, home: "W91", away: "W92" },
      { id: 100, home: "W95", away: "W96" },
    ];

    const KO_SF = [
      { id: 101, home: "W97", away: "W98" },
      { id: 102, home: "W99", away: "W100" },
    ];

    const KO_3RD = { id: 103, home: "L101", away: "L102" };
    const KO_FINAL = { id: 104, home: "W101", away: "W102" };

    const LEGACY_LS_KEYS = ["copa-2026-resultados-v2", "copa-2026-resultados-v1"];

    let state = { groups: {}, ko: {} };
    let saveTimer = null;
    let savingInFlight = false;

    async function fetchState() {
      const r = await fetch("/api/state", { cache: "no-store" });
      if (!r.ok) throw new Error("falha ao carregar state.json");
      return r.json();
    }

    async function postState(payload) {
      const r = await fetch("/api/state", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!r.ok) throw new Error("falha ao salvar state.json");
    }

    function saveState() {
      flashStatus("Salvando…");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        if (savingInFlight) { saveState(); return; }
        savingInFlight = true;
        try {
          await postState(state);
          flashStatus("Salvo");
        } catch (e) {
          flashStatus("Erro ao salvar");
        } finally {
          savingInFlight = false;
        }
      }, 250);
    }

    async function migrateFromLocalStorage() {
      const empty = Object.keys(state.groups || {}).length === 0
                 && Object.keys(state.ko || {}).length === 0;
      if (!empty) return false;
      for (const k of LEGACY_LS_KEYS) {
        const raw = localStorage.getItem(k);
        if (!raw) continue;
        try {
          const parsed = JSON.parse(raw);
          if (parsed && (parsed.groups || parsed.ko)) {
            state = { groups: parsed.groups || {}, ko: parsed.ko || {} };
          } else if (parsed && typeof parsed === "object") {
            state = { groups: parsed, ko: {} };
          } else {
            continue;
          }
          await postState(state);
          localStorage.removeItem(k);
          return true;
        } catch {}
      }
      return false;
    }

    function groupMatchKey(groupId, i) { return `${groupId}-${i}`; }
    function getGroupScore(groupId, i) {
      return state.groups[groupMatchKey(groupId, i)] || { home: "", away: "" };
    }
    function setGroupScore(groupId, i, home, away) {
      const k = groupMatchKey(groupId, i);
      if (home === "" && away === "") delete state.groups[k];
      else state.groups[k] = { home, away };
      saveState();
      withFocusPreserved(() => {
        renderStandings(groupId);
        renderThirdPlace();
        renderBracket();
      });
    }

    function withFocusPreserved(fn) {
      const a = document.activeElement;
      let selector = null, selStart = 0, selEnd = 0;
      if (a && a.tagName === "INPUT") {
        if (a.dataset.ko) {
          selector = `input[data-ko="${a.dataset.ko}"][data-side="${a.dataset.side}"]`;
        } else if (a.dataset.group != null) {
          selector = `input[data-group="${a.dataset.group}"][data-i="${a.dataset.i}"][data-side="${a.dataset.side}"]`;
        }
        try { selStart = a.selectionStart || 0; selEnd = a.selectionEnd || 0; } catch {}
      }
      fn();
      if (selector) {
        const el = document.querySelector(selector);
        if (el) {
          el.focus({ preventScroll: true });
          try { el.setSelectionRange(selStart, selEnd); } catch {}
        }
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    function computeStandings(groupId) {
      const teams = GROUPS[groupId];
      const stats = teams.map((t) => ({
        name: t.name, flag: t.flag, P: 0, V: 0, E: 0, D: 0, GP: 0, GC: 0, SG: 0, Pts: 0,
      }));
      MATCH_PAIRS.forEach((pair, i) => {
        const s = getGroupScore(groupId, i);
        if (s.home === "" || s.away === "") return;
        const h = Number(s.home), a = Number(s.away);
        if (!Number.isFinite(h) || !Number.isFinite(a)) return;
        const [hi, ai] = pair;
        stats[hi].P++; stats[ai].P++;
        stats[hi].GP += h; stats[hi].GC += a;
        stats[ai].GP += a; stats[ai].GC += h;
        if (h > a) { stats[hi].V++; stats[ai].D++; stats[hi].Pts += 3; }
        else if (h < a) { stats[ai].V++; stats[hi].D++; stats[ai].Pts += 3; }
        else { stats[hi].E++; stats[ai].E++; stats[hi].Pts++; stats[ai].Pts++; }
      });
      stats.forEach(s => s.SG = s.GP - s.GC);
      stats.sort((x, y) =>
        y.Pts - x.Pts ||
        y.SG - x.SG ||
        y.GP - x.GP ||
        x.name.localeCompare(y.name, "pt-BR")
      );
      return stats;
    }

    function isGroupComplete(groupId) {
      return MATCH_PAIRS.every((_, i) => {
        const s = getGroupScore(groupId, i);
        return s.home !== "" && s.away !== "" &&
               Number.isFinite(Number(s.home)) && Number.isFinite(Number(s.away));
      });
    }

    function renderStandings(groupId) {
      const tbody = document.querySelector(`#standings-${groupId} tbody`);
      if (!tbody) return;
      const rows = computeStandings(groupId);
      tbody.innerHTML = rows.map((r, idx) => `
        <tr class="${idx < 2 ? "qualified" : ""}">
          <td class="team"><span class="flag">${r.flag}</span>${escapeHtml(r.name)}</td>
          <td>${r.P}</td><td>${r.V}</td><td>${r.E}</td><td>${r.D}</td>
          <td>${r.GP}</td><td>${r.GC}</td><td>${r.SG > 0 ? "+" + r.SG : r.SG}</td>
          <td class="pts">${r.Pts}</td>
        </tr>
      `).join("");
    }

    function renderGroup(groupId) {
      const teams = GROUPS[groupId];
      const matchesHtml = MATCH_PAIRS.map((pair, i) => {
        const [hi, ai] = pair;
        const s = getGroupScore(groupId, i);
        const home = teams[hi], away = teams[ai];
        const time = formatMatchTime(SCHEDULE[`${groupId}-${i}`]);
        return `
          <div class="match-row">
            ${time ? `<div class="match-time">${time}</div>` : ""}
            <div class="match">
              <span class="home team-name" title="${escapeHtml(home.name)}"><span class="flag">${home.flag}</span>${escapeHtml(home.name)}</span>
              <input type="number" min="0" max="99" inputmode="numeric"
                     data-group="${groupId}" data-i="${i}" data-side="home"
                     value="${escapeHtml(s.home)}" />
              <span class="vs">×</span>
              <input type="number" min="0" max="99" inputmode="numeric"
                     data-group="${groupId}" data-i="${i}" data-side="away"
                     value="${escapeHtml(s.away)}" />
              <span class="away team-name" title="${escapeHtml(away.name)}"><span class="flag">${away.flag}</span>${escapeHtml(away.name)}</span>
            </div>
          </div>`;
      }).join("");

      return `
        <section class="group">
          <h2><span class="pill">Grupo ${groupId}</span></h2>
          <table class="standings" id="standings-${groupId}">
            <thead>
              <tr>
                <th style="text-align:left">Time</th>
                <th>P</th><th>V</th><th>E</th><th>D</th>
                <th>GP</th><th>GC</th><th>SG</th><th>Pts</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <div class="matches">${matchesHtml}</div>
        </section>
      `;
    }

    function renderGroups() {
      const main = document.getElementById("groups");
      main.innerHTML = Object.keys(GROUPS).map(renderGroup).join("");
      Object.keys(GROUPS).forEach(renderStandings);
    }

    // ---------- 3º Colocados ----------

    function groupHasAnyMatch(groupId) {
      return MATCH_PAIRS.some((_, i) => {
        const s = getGroupScore(groupId, i);
        return s.home !== "" || s.away !== "";
      });
    }

    function getThirdPlaceRanking() {
      const all = [];
      for (const g of Object.keys(GROUPS)) {
        const standings = computeStandings(g);
        all.push({
          group: g,
          played: groupHasAnyMatch(g),
          complete: isGroupComplete(g),
          team: standings[2],
        });
      }
      all.sort((x, y) =>
        y.team.Pts - x.team.Pts ||
        y.team.SG - x.team.SG ||
        y.team.GP - x.team.GP ||
        x.group.localeCompare(y.group)
      );
      return all;
    }

    function renderThirdPlace() {
      const ranking = getThirdPlaceRanking();
      const playedCount = ranking.filter(r => r.played).length;
      const rowsHtml = ranking.map((r, idx) => {
        const qualified = idx < 8;
        const isCutoff = idx === 7;
        const tag = !r.played
          ? '<span style="color:var(--muted); font-size:11px;"> (sem jogos)</span>'
          : !r.complete
          ? '<span style="color:var(--muted); font-size:11px;"> (parcial)</span>'
          : "";
        return `
          <tr class="${qualified ? "qualified" : ""} ${isCutoff ? "cutoff" : ""}">
            <td class="pos">${idx + 1}º</td>
            <td class="grp">${r.group}</td>
            <td class="team">
              <span class="flag">${r.team.flag}</span>${escapeHtml(r.team.name)}${tag}
            </td>
            <td>${r.team.P}</td><td>${r.team.V}</td><td>${r.team.E}</td><td>${r.team.D}</td>
            <td>${r.team.GP}</td><td>${r.team.GC}</td>
            <td>${r.team.SG > 0 ? "+" + r.team.SG : r.team.SG}</td>
            <td class="pts">${r.team.Pts}</td>
          </tr>`;
      }).join("");
      document.getElementById("third-place").innerHTML = `
        <table class="third-table">
          <thead>
            <tr>
              <th></th><th>Grupo</th>
              <th style="text-align:left">Time</th>
              <th>P</th><th>V</th><th>E</th><th>D</th>
              <th>GP</th><th>GC</th><th>SG</th><th>Pts</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      `;
    }

    // ---------- Mata-mata ----------

    // Designa os 3º colocados aos slots de 16-avos via bipartite matching
    // (augmenting paths). Só considera grupos com pelo menos 1 jogo lançado.
    // Slots sem atribuição mostram placeholder "3º (X/Y/...)".
    function assignThirdPlaces() {
      const SLOT_CONSTRAINTS = {
        74: ["A","B","C","D","F"],
        77: ["C","D","F","G","H"],
        79: ["C","E","F","H","I"],
        80: ["E","H","I","J","K"],
        81: ["B","E","F","I","J"],
        82: ["A","E","H","I","J"],
        85: ["E","F","G","I","J"],
        87: ["D","E","I","J","L"],
      };
      const ranking = getThirdPlaceRanking();
      const candidates = ranking.filter(r => r.played).slice(0, 8).map(r => r.group);
      const slotIds = Object.keys(SLOT_CONSTRAINTS).map(Number);
      const slotOwner = {}; // sid -> group
      const validForSlot = (g, sid) => SLOT_CONSTRAINTS[sid].includes(g);
      function augment(g, visited) {
        for (const sid of slotIds) {
          if (visited.has(sid) || !validForSlot(g, sid)) continue;
          visited.add(sid);
          if (!(sid in slotOwner) || augment(slotOwner[sid], visited)) {
            slotOwner[sid] = g;
            return true;
          }
        }
        return false;
      }
      for (const g of candidates) augment(g, new Set());
      return slotOwner;
    }

    function resolveSlot(slot) {
      // returns {name, flag} ou null
      if (/^[12][A-L]$/.test(slot)) {
        const pos = parseInt(slot[0]) - 1;
        const g = slot[1];
        const hasAny = MATCH_PAIRS.some((_, i) => {
          const s = getGroupScore(g, i);
          return s.home !== "" || s.away !== "";
        });
        if (!hasAny) return null;
        return computeStandings(g)[pos];
      }
      if (slot.startsWith("3:")) {
        const assign = thirdAssignmentCache;
        if (!assign) return null;
        // descobrir o matchId que tem esse slot exato
        const m = KO_R32.find(x => x.away === slot);
        if (!m) return null;
        const g = assign[m.id];
        if (!g) return null;
        return computeStandings(g)[2];
      }
      if (slot.startsWith("W") || slot.startsWith("L")) {
        const want = slot[0];
        const id = parseInt(slot.slice(1));
        return getKnockoutOutcome(id, want === "W" ? "winner" : "loser");
      }
      return null;
    }

    function allKnockoutMatches() {
      return [...KO_R32, ...KO_R16, ...KO_QF, ...KO_SF, KO_3RD, KO_FINAL];
    }
    function findKnockoutMatch(id) {
      return allKnockoutMatches().find(m => m.id === id);
    }

    function getKnockoutScore(id) {
      return state.ko[id] || { home: "", away: "", penHome: "", penAway: "" };
    }

    function setKnockoutScore(id, patch) {
      const cur = getKnockoutScore(id);
      const next = { ...cur, ...patch };
      const empty = !next.home && !next.away && !next.penHome && !next.penAway;
      if (empty) delete state.ko[id];
      else state.ko[id] = next;
      saveState();
      withFocusPreserved(() => renderBracket());
    }

    function getKnockoutOutcome(id, which) {
      const match = findKnockoutMatch(id);
      if (!match) return null;
      const home = resolveSlot(match.home);
      const away = resolveSlot(match.away);
      if (!home || !away) return null;
      const s = getKnockoutScore(id);
      if (s.home === "" || s.away === "") return null;
      const h = Number(s.home), a = Number(s.away);
      if (!Number.isFinite(h) || !Number.isFinite(a)) return null;
      let winner, loser;
      if (h > a) { winner = home; loser = away; }
      else if (a > h) { winner = away; loser = home; }
      else {
        const ph = Number(s.penHome), pa = Number(s.penAway);
        if (!Number.isFinite(ph) || !Number.isFinite(pa) || ph === pa) return null;
        if (ph > pa) { winner = home; loser = away; }
        else { winner = away; loser = home; }
      }
      return which === "winner" ? winner : loser;
    }

    function slotLabel(slot) {
      if (slot.startsWith("3:")) {
        return `3º (${slot.slice(2).split(",").join("/")})`;
      }
      if (slot.startsWith("W")) return `Venc. jogo ${slot.slice(1)}`;
      if (slot.startsWith("L")) return `Perd. jogo ${slot.slice(1)}`;
      return slot[0] + "º Grupo " + slot[1];
    }

    let thirdAssignmentCache = null;

    function renderBracket() {
      thirdAssignmentCache = assignThirdPlaces();
      const rounds = [
        { title: "16-avos de final", matches: KO_R32 },
        { title: "Oitavas de final", matches: KO_R16 },
        { title: "Quartas de final", matches: KO_QF },
        { title: "Semifinais", matches: KO_SF },
        { title: "Disputa do 3º Lugar", matches: [KO_3RD] },
        { title: "Final", matches: [KO_FINAL], isFinal: true },
      ];
      const champion = getKnockoutOutcome(KO_FINAL.id, "winner");
      const championHtml = champion ? `
        <div class="champion">
          <div class="trophy">🏆</div>
          <div class="champion-label">Campeão</div>
          <div class="champion-team">
            <span class="flag">${champion.flag}</span>${escapeHtml(champion.name)}
          </div>
        </div>
      ` : "";
      const roundsHtml = rounds.map(r => `
        <div class="bracket-round ${r.isFinal ? "final-round" : ""}">
          <h3>${r.title}</h3>
          <div class="matches-grid">
            ${r.matches.map(renderKoMatch).join("")}
          </div>
        </div>
      `).join("");
      document.getElementById("bracket").innerHTML = `
        <div class="bracket">${roundsHtml}${championHtml}</div>
      `;
    }

    function renderKoMatch(m) {
      const home = resolveSlot(m.home);
      const away = resolveSlot(m.away);
      const s = getKnockoutScore(m.id);
      const h = Number(s.home), a = Number(s.away);
      const finite = Number.isFinite(h) && Number.isFinite(a);
      const ph = Number(s.penHome), pa = Number(s.penAway);
      const penFinite = Number.isFinite(ph) && Number.isFinite(pa) && ph !== pa;
      const winnerSide =
        !finite ? null :
        h > a ? "home" :
        a > h ? "away" :
        penFinite ? (ph > pa ? "home" : "away") : null;
      const tied = finite && h === a;

      const homeLabel = home
        ? `<span class="flag">${home.flag}</span>${escapeHtml(home.name)}`
        : slotLabel(m.home);
      const awayLabel = away
        ? `<span class="flag">${away.flag}</span>${escapeHtml(away.name)}`
        : slotLabel(m.away);

      const labelTag = m.id === 103 ? "3º Lugar" : m.id === 104 ? "Final" : `Jogo ${m.id}`;
      const time = formatMatchTime(SCHEDULE[`ko-${m.id}`]);

      return `
        <div class="ko-match">
          <div class="ko-id">${labelTag}${time ? ` • <span style="text-transform:none;letter-spacing:0;">${time}</span>` : ""}</div>
          <div class="ko-row ${winnerSide === "home" ? "winner" : ""} ${!home ? "placeholder" : ""}">
            <span class="team-label">${homeLabel}</span>
            <input type="number" min="0" max="99" inputmode="numeric"
                   data-ko="${m.id}" data-side="home" value="${escapeHtml(s.home || "")}" />
          </div>
          <div class="ko-row ${winnerSide === "away" ? "winner" : ""} ${!away ? "placeholder" : ""}">
            <span class="team-label">${awayLabel}</span>
            <input type="number" min="0" max="99" inputmode="numeric"
                   data-ko="${m.id}" data-side="away" value="${escapeHtml(s.away || "")}" />
          </div>
          ${tied ? `
            <div class="ko-pens">
              <span>Pênaltis</span>
              <span class="flag">${home ? home.flag : ""}</span>
              <input type="number" min="0" max="20" inputmode="numeric"
                     data-ko="${m.id}" data-side="penHome" value="${escapeHtml(s.penHome || "")}" />
              <span class="vs">×</span>
              <input type="number" min="0" max="20" inputmode="numeric"
                     data-ko="${m.id}" data-side="penAway" value="${escapeHtml(s.penAway || "")}" />
              <span class="flag">${away ? away.flag : ""}</span>
            </div>` : ""}
        </div>
      `;
    }

    function renderAll() {
      renderGroups();
      renderThirdPlace();
      renderBracket();
    }

    // ---------- Events ----------

    document.addEventListener("input", (ev) => {
      const t = ev.target;
      if (!(t instanceof HTMLInputElement) || t.type !== "number") return;
      // Group input
      if (t.dataset.group) {
        const groupId = t.dataset.group;
        const i = Number(t.dataset.i);
        const side = t.dataset.side;
        const sibling = document.querySelector(
          `input[data-group="${groupId}"][data-i="${i}"][data-side="${side === "home" ? "away" : "home"}"]`
        );
        const home = side === "home" ? t.value : sibling.value;
        const away = side === "away" ? t.value : sibling.value;
        setGroupScore(groupId, i, home.trim(), away.trim());
        return;
      }
      // Knockout input
      if (t.dataset.ko) {
        const id = Number(t.dataset.ko);
        const side = t.dataset.side;
        if (side === "home" || side === "away") {
          const other = side === "home" ? "away" : "home";
          const sibling = document.querySelector(`input[data-ko="${id}"][data-side="${other}"]`);
          const patch = {};
          patch[side] = t.value.trim();
          patch[other] = (sibling?.value || "").trim();
          setKnockoutScore(id, patch);
        } else if (side === "penHome" || side === "penAway") {
          const other = side === "penHome" ? "penAway" : "penHome";
          const sibling = document.querySelector(`input[data-ko="${id}"][data-side="${other}"]`);
          const patch = {};
          patch[side] = t.value.trim();
          patch[other] = (sibling?.value || "").trim();
          setKnockoutScore(id, patch);
        }
        return;
      }
    });

    document.getElementById("reset-btn").addEventListener("click", async () => {
      if (!confirm("Apagar todos os resultados preenchidos?")) return;
      state = { groups: {}, ko: {} };
      try { await postState(state); flashStatus("Resetado"); }
      catch { flashStatus("Erro ao salvar"); }
      renderAll();
    });

    document.getElementById("export-btn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `copa-2026-resultados-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    function loadHtml2Canvas() {
      if (window.html2canvas) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("falha ao baixar html2canvas (precisa de internet na 1ª vez)"));
        document.head.appendChild(s);
      });
    }

    // html2canvas não renderiza o `value` de <input>. Trocamos temporariamente
    // por <span> com a mesma largura/estilo durante a captura.
    function inputsToSpans(root) {
      const restores = [];
      root.querySelectorAll("input[type='number'], input[type='text']").forEach((inp) => {
        const cs = getComputedStyle(inp);
        const span = document.createElement("span");
        span.textContent = inp.value || "";
        span.style.display = "inline-flex";
        span.style.alignItems = "center";
        span.style.justifyContent = cs.textAlign === "left" ? "flex-start" : (cs.textAlign === "right" ? "flex-end" : "center");
        span.style.width = cs.width;
        span.style.height = cs.height;
        span.style.padding = cs.padding;
        span.style.border = cs.border;
        span.style.borderRadius = cs.borderRadius;
        span.style.background = cs.backgroundColor;
        span.style.color = cs.color;
        span.style.font = cs.font;
        span.style.boxSizing = cs.boxSizing;
        span.style.verticalAlign = "middle";
        inp.parentNode.insertBefore(span, inp);
        inp.style.display = "none";
        restores.push(() => { inp.style.display = ""; span.remove(); });
      });
      return () => restores.forEach((fn) => fn());
    }

    document.getElementById("png-btn").addEventListener("click", async () => {
      const btn = document.getElementById("png-btn");
      const original = btn.textContent;
      btn.textContent = "Gerando…";
      btn.disabled = true;

      const toolbar = document.querySelector(".toolbar");
      const status = document.getElementById("status");
      const prevToolbar = toolbar.style.visibility;
      const prevStatus = status.style.visibility;
      toolbar.style.visibility = "hidden";
      status.style.visibility = "hidden";

      // Neutraliza o gradiente decorativo do body/html durante a captura
      // (caso contrário, na altura total da página, o gradiente do topo
      // contrasta com a cor base sólida e gera uma faixa "mais escura").
      const FLAT_BG = "#ffffff";
      const prevBodyBg = document.body.style.background;
      const prevHtmlBg = document.documentElement.style.background;
      document.body.style.background = FLAT_BG;
      document.documentElement.style.background = FLAT_BG;

      const restoreInputs = inputsToSpans(document.body);
      const prevScrollY = window.scrollY;
      window.scrollTo(0, 0);

      try {
        await loadHtml2Canvas();
        const canvas = await window.html2canvas(document.body, {
          backgroundColor: FLAT_BG,
          scale: 2,
          useCORS: true,
          windowWidth: document.documentElement.scrollWidth,
          windowHeight: document.documentElement.scrollHeight,
        });
        const dataUrl = canvas.toDataURL("image/png");
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = `copa-2026-${new Date().toISOString().slice(0,10)}.png`;
        a.click();
      } catch (e) {
        alert("Falha ao gerar PNG: " + e.message);
      } finally {
        restoreInputs();
        document.body.style.background = prevBodyBg;
        document.documentElement.style.background = prevHtmlBg;
        toolbar.style.visibility = prevToolbar;
        status.style.visibility = prevStatus;
        window.scrollTo(0, prevScrollY);
        btn.textContent = original;
        btn.disabled = false;
      }
    });

    document.getElementById("import-btn").addEventListener("click", () => {
      document.getElementById("import-file").click();
    });
    document.getElementById("import-file").addEventListener("change", async (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (typeof parsed !== "object" || Array.isArray(parsed)) throw new Error("formato inválido");
        if (parsed.groups || parsed.ko) {
          state = { groups: parsed.groups || {}, ko: parsed.ko || {} };
        } else {
          state = { groups: parsed, ko: {} };
        }
        await postState(state);
        renderAll();
        flashStatus("Importado");
      } catch (e) {
        alert("Falha ao importar: " + e.message);
      } finally {
        ev.target.value = "";
      }
    });

    function flashStatus(text) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.classList.add("show");
      clearTimeout(flashStatus._t);
      flashStatus._t = setTimeout(() => el.classList.remove("show"), 900);
    }

    // Heartbeat: enquanto essa aba estiver aberta a conexão SSE fica viva.
    // Quando fechar, o server detecta o close e encerra o processo do node.
    try { new EventSource("/api/heartbeat"); } catch {}

    (async () => {
      try {
        const loaded = await fetchState();
        state = {
          groups: (loaded && loaded.groups) || {},
          ko: (loaded && loaded.ko) || {},
        };
      } catch (e) {
        alert("Servidor não encontrado. Rode `node server.js` na pasta do projeto e acesse http://localhost:5173");
      }
      await migrateFromLocalStorage().catch(() => {});
      renderAll();
    })();
  </script>
</body>
</html>

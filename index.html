    async function fetchState() {
      const r = await fetch("/api/state", { cache: "no-store" });
      if (!r.ok) throw new Error("falha ao carregar state.json");
      setCurrentUser(r.headers.get("X-Auth-User"));
      return r.json();
    }

    function setCurrentUser(user) {
      const chip = document.getElementById("user-chip");
      const out = document.getElementById("logout-btn");
      const real = !!user && user !== "default";
      if (chip) {
        chip.hidden = !real;
        if (real) chip.textContent = `Logado como ${user}`;
      }
      if (out) out.hidden = !real;
    }

    // Basic Auth não tem logout nativo: sobrescreve as credenciais salvas no
    // navegador com algo inválido e recarrega, pra ele pedir login de novo.
    function logout() {
      try {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "/api/state?logout=" + Date.now(), false, "logout", "x" + Date.now());
        xhr.send();
      } catch (e) {}
      location.reload();
    }

    async function postState(payload) {
      const r = await fetch("/api/state", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!r.ok) throw new Error("falha ao salvar state.json");
    }

    function saveState() {
      flashStatus("Salvando…");
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        if (savingInFlight) { saveState(); return; }
        savingInFlight = true;
        try {
          await postState(state);
          flashStatus("Salvo");
        } catch (e) {
          flashStatus("Erro ao salvar");
        } finally {
          savingInFlight = false;
        }
      }, 250);
    }

    // ---------- Seções colapsáveis (preferência salva por conta) ----------
    function isCollapsed(id) {
      return !!(state.ui && Array.isArray(state.ui.collapsed) && state.ui.collapsed.includes(id));
    }
    function toggleCollapsed(id) {
      if (!state.ui || !Array.isArray(state.ui.collapsed)) state.ui = { collapsed: [] };
      const arr = state.ui.collapsed;
      const i = arr.indexOf(id);
      if (i >= 0) arr.splice(i, 1);
      else arr.push(id);
      saveState();
      syncCollapsibles();
    }
    // Aplica a classe .collapsed a todos os cabeçalhos colapsáveis presentes no DOM
    // (estáticos e os rounds re-renderizados), conforme a preferência atual.
    function syncCollapsibles() {
      document.querySelectorAll("[data-collapse-id]").forEach((h) => {
        h.classList.toggle("collapsed", isCollapsed(h.dataset.collapseId));
      });
    }
    document.addEventListener("click", (e) => {
      const h = e.target.closest("[data-collapse-id]");
      if (!h) return;
      toggleCollapsed(h.dataset.collapseId);
    });

    // Alternador de visão do mata-mata (lista / árvore / círculo), preferência salva por conta.
    function applyBracketView(v) {
      // O toggle de lista foi removido; árvore é o padrão. A lógica da lista
      // continua (renderiza em #bracket, oculto), mas não há mais botão pra ela.
      const view = v === "circle" ? "circle" : "tree";
      const list = document.getElementById("bracket");
      const tree = document.getElementById("bracket-tree");
      const radial = document.getElementById("bracket-radial");
      if (list) list.hidden = view !== "list";
      if (tree) tree.hidden = view !== "tree";
      if (radial) radial.hidden = view !== "circle";
      document.querySelectorAll("#bracket-view-toggle button").forEach((b) =>
        b.classList.toggle("active", b.dataset.view === view));
    }
    function setBracketView(v) {
      if (!state.ui || typeof state.ui !== "object") state.ui = { collapsed: [] };
      state.ui.bracketView = v;
      saveState();
      applyBracketView(v);
    }
    document.getElementById("bracket-view-toggle").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-view]");
      if (!b) return;
      setBracketView(b.dataset.view);
    });
    // O bracket radial é dimensionado em px conforme a largura da janela; re-renderiza no resize.
    let radialResizeTimer = null;
    window.addEventListener("resize", () => {
      if (!state.ui || state.ui.bracketView !== "circle") return;
      clearTimeout(radialResizeTimer);
      radialResizeTimer = setTimeout(renderRadialBracket, 150);
    });

    function groupMatchKey(groupId, i) { return `${groupId}-${i}`; }
    function getGroupScore(groupId, i) {
      return state.groups[groupMatchKey(groupId, i)] || { home: "", away: "" };
    }
    function setGroupScore(groupId, i, home, away) {
      const k = groupMatchKey(groupId, i);
      if (home === "" && away === "") delete state.groups[k];
      else state.groups[k] = { home, away };
      saveState();
      withFocusPreserved(() => {
        renderStandings(groupId);
        renderThirdPlace();
        renderBracket();
        renderTodayMatches();
        renderSimulator();
      });
    }

    function withFocusPreserved(fn) {
      const a = document.activeElement;
      let selector = null, selStart = 0, selEnd = 0;
      if (a && a.tagName === "INPUT") {
        if (a.dataset.ko) {
          selector = `input[data-ko="${a.dataset.ko}"][data-side="${a.dataset.side}"]`;
        } else if (a.dataset.group != null) {
          selector = `input[data-group="${a.dataset.group}"][data-i="${a.dataset.i}"][data-side="${a.dataset.side}"]`;
        }
        try { selStart = a.selectionStart || 0; selEnd = a.selectionEnd || 0; } catch {}
      }
      fn();
      if (selector) {
        // Lista e árvore têm inputs com o mesmo data-ko; restauramos o foco no
        // que está visível (offsetParent != null), não no de uma visão oculta.
        const matches = Array.from(document.querySelectorAll(selector));
        const el = matches.find((m) => m.offsetParent !== null) || matches[0];
        if (el) {
          el.focus({ preventScroll: true });
          try { el.setSelectionRange(selStart, selEnd); } catch {}
        }
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    function computeStandings(groupId) {
      const teams = GROUPS[groupId];
      const stats = teams.map((t, i) => ({
        idx: i, name: t.name, flag: t.flag, P: 0, V: 0, E: 0, D: 0, GP: 0, GC: 0, SG: 0, Pts: 0,
      }));
      const matches = []; // jogos lançados, p/ o confronto direto
      MATCH_PAIRS.forEach((pair, i) => {
        const s = getGroupScore(groupId, i);
        if (s.home === "" || s.away === "") return;
        const h = Number(s.home), a = Number(s.away);
        if (!Number.isFinite(h) || !Number.isFinite(a)) return;
        const [hi, ai] = pair;
        matches.push({ hi, ai, h, a });
        stats[hi].P++; stats[ai].P++;
        stats[hi].GP += h; stats[hi].GC += a;
        stats[ai].GP += a; stats[ai].GC += h;
        if (h > a) { stats[hi].V++; stats[ai].D++; stats[hi].Pts += 3; }
        else if (h < a) { stats[ai].V++; stats[hi].D++; stats[ai].Pts += 3; }
        else { stats[hi].E++; stats[ai].E++; stats[hi].Pts++; stats[ai].Pts++; }
      });
      stats.forEach(s => s.SG = s.GP - s.GC);

      // Mini-tabela considerando só os jogos ENTRE os times do subconjunto.
      function h2h(subset) {
        const ids = new Set(subset.map(s => s.idx));
        const mini = {};
        subset.forEach(s => (mini[s.idx] = { Pts: 0, GD: 0, GF: 0 }));
        for (const m of matches) {
          if (!ids.has(m.hi) || !ids.has(m.ai)) continue;
          mini[m.hi].GF += m.h; mini[m.ai].GF += m.a;
          mini[m.hi].GD += m.h - m.a; mini[m.ai].GD += m.a - m.h;
          if (m.h > m.a) mini[m.hi].Pts += 3;
          else if (m.h < m.a) mini[m.ai].Pts += 3;
          else { mini[m.hi].Pts++; mini[m.ai].Pts++; }
        }
        return mini;
      }

      const cmpName = (x, y) => x.name.localeCompare(y.name, "pt-BR");
      // agrupa elementos consecutivos considerados "iguais" pelo comparador.
      function runs(arr, eq) {
        const out = [[arr[0]]];
        for (let i = 1; i < arr.length; i++) {
          (eq(arr[i - 1], arr[i]) ? out[out.length - 1] : out[out.push([]) - 1]).push(arr[i]);
        }
        return out;
      }

      // Critérios FIFA: 1-3 (Pts, SG, GP em todos os jogos); em empate, 4-6
      // (confronto direto: Pts, SG, GP só entre os empatados, reaplicado ao
      // subconjunto que seguir empatado); fallback alfabético (sem fair play/sorteio).
      function breakH2H(tied) {
        const mini = h2h(tied);
        const cmp = (x, y) =>
          mini[y.idx].Pts - mini[x.idx].Pts ||
          mini[y.idx].GD - mini[x.idx].GD ||
          mini[y.idx].GF - mini[x.idx].GF;
        const sorted = [...tied].sort(cmp);
        const out = [];
        for (const run of runs(sorted, (a, b) => cmp(a, b) === 0)) {
          if (run.length === 1) out.push(run[0]);
          else if (run.length === tied.length) out.push(...run.sort(cmpName));
          else out.push(...breakH2H(run));
        }
        return out;
      }

      const cmpAll = (x, y) => y.Pts - x.Pts || y.SG - x.SG || y.GP - x.GP;
      const sorted = [...stats].sort(cmpAll);
      const result = [];
      for (const run of runs(sorted, (a, b) => cmpAll(a, b) === 0)) {
        if (run.length === 1) result.push(run[0]);
        else result.push(...breakH2H(run));
      }
      return result;
    }

    function isGroupComplete(groupId) {
      return MATCH_PAIRS.every((_, i) => {
        const s = getGroupScore(groupId, i);
        return s.home !== "" && s.away !== "" &&
               Number.isFinite(Number(s.home)) && Number.isFinite(Number(s.away));
      });
    }

    function renderStandings(groupId) {
      const tbody = document.querySelector(`#standings-${groupId} tbody`);
      if (!tbody) return;
      const rows = computeStandings(groupId);
      tbody.innerHTML = rows.map((r, idx) => `
        <tr class="${idx < 2 ? "qualified" : ""}">
          <td class="team"><span class="flag">${r.flag}</span>${escapeHtml(r.name)}</td>
          <td>${r.P}</td><td>${r.V}</td><td>${r.E}</td><td>${r.D}</td>
          <td>${r.GP}</td><td>${r.GC}</td><td>${r.SG > 0 ? "+" + r.SG : r.SG}</td>
          <td class="pts">${r.Pts}</td>
        </tr>
      `).join("");
    }

    function renderGroup(groupId) {
      const teams = GROUPS[groupId];
      // Exibe os jogos em ordem de data. O slot (i) define o confronto e onde o
      // placar é salvo, mas a ordem cronológica difere da ordem dos slots em
      // alguns grupos (ex.: grupo L, que inverte os confrontos da 2ª/3ª rodada).
      const order = MATCH_PAIRS.map((_, i) => i).sort((a, b) =>
        new Date(SCHEDULE[`${groupId}-${a}`] || 0) - new Date(SCHEDULE[`${groupId}-${b}`] || 0)
      );
      const matchesHtml = order.map((i) => {
        const pair = MATCH_PAIRS[i];
        const [hi, ai] = pair;
        const s = getGroupScore(groupId, i);
        const home = teams[hi], away = teams[ai];
        const time = formatMatchTime(SCHEDULE[`${groupId}-${i}`]);
        return `
          <div class="match-row">
            ${time ? `<div class="match-time">${time}</div>` : ""}
            <div class="match">
              <span class="home team-name" title="${escapeHtml(home.name)}"><span class="flag">${home.flag}</span>${escapeHtml(home.name)}</span>
              <input type="number" min="0" max="99" inputmode="numeric"
                     data-group="${groupId}" data-i="${i}" data-side="home"
                     value="${escapeHtml(s.home)}" />
              <span class="vs">×</span>
              <input type="number" min="0" max="99" inputmode="numeric"
                     data-group="${groupId}" data-i="${i}" data-side="away"
                     value="${escapeHtml(s.away)}" />
              <span class="away team-name" title="${escapeHtml(away.name)}"><span class="flag">${away.flag}</span>${escapeHtml(away.name)}</span>
            </div>
          </div>`;
      }).join("");

      return `
        <section class="group">
          <h2><span class="pill">Grupo ${groupId}</span></h2>
          <table class="standings" id="standings-${groupId}">
            <thead>
              <tr>
                <th style="text-align:left">Time</th>
                <th>P</th><th>V</th><th>E</th><th>D</th>
                <th>GP</th><th>GC</th><th>SG</th><th>Pts</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <div class="matches">${matchesHtml}</div>
        </section>
      `;
    }

    function renderGroups() {
      const main = document.getElementById("groups");
      main.innerHTML = Object.keys(GROUPS).map(renderGroup).join("");
      Object.keys(GROUPS).forEach(renderStandings);
    }

    // ---------- 3º Colocados ----------

    function groupHasAnyMatch(groupId) {
      return MATCH_PAIRS.some((_, i) => {
        const s = getGroupScore(groupId, i);
        return s.home !== "" || s.away !== "";
      });
    }

    function getThirdPlaceRanking() {
      const all = [];
      for (const g of Object.keys(GROUPS)) {
        const standings = computeStandings(g);
        all.push({
          group: g,
          played: groupHasAnyMatch(g),
          complete: isGroupComplete(g),
          team: standings[2],
        });
      }
      all.sort((x, y) =>
        y.team.Pts - x.team.Pts ||
        y.team.SG - x.team.SG ||
        y.team.GP - x.team.GP ||
        x.group.localeCompare(y.group)
      );
      return all;
    }

    function renderThirdPlace() {
      const ranking = getThirdPlaceRanking();
      const playedCount = ranking.filter(r => r.played).length;
      const rowsHtml = ranking.map((r, idx) => {
        const qualified = idx < 8;
        const isCutoff = idx === 7;
        const tag = !r.played
          ? '<span style="color:var(--muted); font-size:11px;"> (sem jogos)</span>'
          : !r.complete
          ? '<span style="color:var(--muted); font-size:11px;"> (parcial)</span>'
          : "";
        return `
          <tr class="${qualified ? "qualified" : ""} ${isCutoff ? "cutoff" : ""}">
            <td class="pos">${idx + 1}º</td>
            <td class="grp">${r.group}</td>
            <td class="team">
              <span class="flag">${r.team.flag}</span>${escapeHtml(r.team.name)}${tag}
            </td>
            <td>${r.team.P}</td><td>${r.team.V}</td><td>${r.team.E}</td><td>${r.team.D}</td>
            <td>${r.team.GP}</td><td>${r.team.GC}</td>
            <td>${r.team.SG > 0 ? "+" + r.team.SG : r.team.SG}</td>
            <td class="pts">${r.team.Pts}</td>
          </tr>`;
      }).join("");
      document.getElementById("third-place").innerHTML = `
        <table class="third-table">
          <thead>
            <tr>
              <th></th><th>Grupo</th>
              <th style="text-align:left">Time</th>
              <th>P</th><th>V</th><th>E</th><th>D</th>
              <th>GP</th><th>GC</th><th>SG</th><th>Pts</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      `;
    }

    // ---------- Mata-mata ----------

    // Designa os 3º colocados aos slots de 16-avos.
    // Quando a fase de grupos termina (12 grupos completos), usa a tabela oficial
    // da FIFA (Annex C / THIRD_PLACE_TABLE), que é a regra de verdade.
    // Antes disso, faz uma prévia progressiva via bipartite matching (augmenting
    // paths), considerando só grupos com pelo menos 1 jogo lançado. Slots sem
    // atribuição mostram placeholder "3º (X/Y/...)".
    function assignThirdPlaces() {
      const ranking = getThirdPlaceRanking();

      // Caminho oficial: todos os 12 grupos completos -> lookup determinístico.
      if (ranking.every(r => r.complete)) {
        const key = ranking.slice(0, 8).map(r => r.group).sort().join("");
        const row = THIRD_PLACE_TABLE[key];
        if (row) {
          const winners = ["A","B","D","E","G","I","K","L"];
          const out = {};
          winners.forEach((w, idx) => { out[WINNER_TO_SLOT[w]] = row[idx]; });
          return out;
        }
      }

      // Prévia progressiva enquanto a fase de grupos não terminou.
      const SLOT_CONSTRAINTS = {
        74: ["A","B","C","D","F"],
        77: ["C","D","F","G","H"],
        79: ["C","E","F","H","I"],
        80: ["E","H","I","J","K"],
        81: ["B","E","F","I","J"],
        82: ["A","E","H","I","J"],
        85: ["E","F","G","I","J"],
        87: ["D","E","I","J","L"],
      };
      const candidates = ranking.filter(r => r.played).slice(0, 8).map(r => r.group);
      const slotIds = Object.keys(SLOT_CONSTRAINTS).map(Number);
      const slotOwner = {}; // sid -> group
      const validForSlot = (g, sid) => SLOT_CONSTRAINTS[sid].includes(g);
      function augment(g, visited) {
        for (const sid of slotIds) {
          if (visited.has(sid) || !validForSlot(g, sid)) continue;
          visited.add(sid);
          if (!(sid in slotOwner) || augment(slotOwner[sid], visited)) {
            slotOwner[sid] = g;
            return true;
          }
        }
        return false;
      }
      for (const g of candidates) augment(g, new Set());
      return slotOwner;
    }

    function resolveSlot(slot) {
      // returns {name, flag} ou null
      if (/^[12][A-L]$/.test(slot)) {
        const pos = parseInt(slot[0]) - 1;
        const g = slot[1];
        const hasAny = MATCH_PAIRS.some((_, i) => {
          const s = getGroupScore(g, i);
          return s.home !== "" || s.away !== "";
        });
        if (!hasAny) return null;
        return computeStandings(g)[pos];
      }
      if (slot.startsWith("3:")) {
        const assign = thirdAssignmentCache;
        if (!assign) return null;
        // descobrir o matchId que tem esse slot exato
        const m = KO_R32.find(x => x.away === slot);
        if (!m) return null;
        const g = assign[m.id];
        if (!g) return null;
        return computeStandings(g)[2];
      }
      if (slot.startsWith("W") || slot.startsWith("L")) {
        const want = slot[0];
        const id = parseInt(slot.slice(1));
        return getKnockoutOutcome(id, want === "W" ? "winner" : "loser");
      }
      return null;
    }

    function allKnockoutMatches() {
      return [...KO_R32, ...KO_R16, ...KO_QF, ...KO_SF, KO_3RD, KO_FINAL];
    }
    function findKnockoutMatch(id) {
      return allKnockoutMatches().find(m => m.id === id);
    }

    function getKnockoutScore(id) {
      return state.ko[id] || { home: "", away: "", penHome: "", penAway: "" };
    }

    function setKnockoutScore(id, patch) {
      const cur = getKnockoutScore(id);
      const next = { ...cur, ...patch };
      const empty = !next.home && !next.away && !next.penHome && !next.penAway;
      if (empty) delete state.ko[id];
      else state.ko[id] = next;
      saveState();
      withFocusPreserved(() => { renderBracket(); renderTodayMatches(); renderSimulator(); });
    }

    function getKnockoutOutcome(id, which) {
      const match = findKnockoutMatch(id);
      if (!match) return null;
      const home = resolveSlot(match.home);
      const away = resolveSlot(match.away);
      if (!home || !away) return null;
      const s = getKnockoutScore(id);
      if (s.home === "" || s.away === "") return null;
      const h = Number(s.home), a = Number(s.away);
      if (!Number.isFinite(h) || !Number.isFinite(a)) return null;
      let winner, loser;
      if (h > a) { winner = home; loser = away; }
      else if (a > h) { winner = away; loser = home; }
      else {
        const ph = Number(s.penHome), pa = Number(s.penAway);
        if (!Number.isFinite(ph) || !Number.isFinite(pa) || ph === pa) return null;
        if (ph > pa) { winner = home; loser = away; }
        else { winner = away; loser = home; }
      }
      return which === "winner" ? winner : loser;
    }

    function slotLabel(slot) {
      if (slot.startsWith("3:")) {
        return `3º (${slot.slice(2).split(",").join("/")})`;
      }
      if (slot.startsWith("W")) return `Venc. jogo ${slot.slice(1)}`;
      if (slot.startsWith("L")) return `Perd. jogo ${slot.slice(1)}`;
      return slot[0] + "º Grupo " + slot[1];
    }

    let thirdAssignmentCache = null;

    function renderBracket() {
      thirdAssignmentCache = assignThirdPlaces();
      const rounds = [
        { id: "ko-r32", title: "16-avos de final", matches: KO_R32 },
        { id: "ko-r16", title: "Oitavas de final", matches: KO_R16 },
        { id: "ko-qf", title: "Quartas de final", matches: KO_QF },
        { id: "ko-sf", title: "Semifinais", matches: KO_SF },
        { id: "ko-3rd", title: "Disputa do 3º Lugar", matches: [KO_3RD] },
        { id: "ko-final", title: "Final", matches: [KO_FINAL], isFinal: true },
      ];
      const champion = getKnockoutOutcome(KO_FINAL.id, "winner");
      const championHtml = champion ? `
        <div class="champion">
          <div class="trophy">🏆</div>
          <div class="champion-label">Campeão</div>
          <div class="champion-team">
            <span class="flag">${champion.flag}</span>${escapeHtml(champion.name)}
          </div>
        </div>
      ` : "";
      const koTime = (m) => new Date(SCHEDULE[`ko-${m.id}`] || 0).getTime();
      const roundsHtml = rounds.map(r => `
        <div class="bracket-round ${r.isFinal ? "final-round" : ""}">
          <h3 data-collapse-id="${r.id}"><span class="chevron">▾</span>${r.title}</h3>
          <div class="matches-grid">
            ${r.matches.slice().sort((a, b) => koTime(a) - koTime(b)).map(renderKoMatch).join("")}
          </div>
        </div>
      `).join("");
      document.getElementById("bracket").innerHTML = `
        <div class="bracket">${roundsHtml}${championHtml}</div>
      `;
      syncCollapsibles();
      renderTreeBracket();
      renderRadialBracket();
    }

    // ---------- Bracket em árvore (chaveamento horizontal, editável) ----------
    // Mesma estrutura do radial (binária a partir da final 104), mas disposta em
    // colunas: 16-avos -> oitavas -> quartas -> semis -> final, ligadas por
    // conectores em cotovelo. Reaproveita os cards editáveis do renderKoMatch.
    const TREE_COL_W = 230;     // largura do card
    const TREE_COL_GAP = 62;    // espaço entre colunas (onde passam os conectores)
    const TREE_ROW_PITCH = 140; // passo vertical entre confrontos dos 16-avos
                                // (>= altura do card com linha de pênaltis + folga)
    const TREE_HEAD_H = 30;     // faixa dos títulos de fase no topo
    const TREE_PAD = 8;
    const TREE_CHAMP_W = 170;
    const TREE_TITLES = ["16-avos de final", "Oitavas de final", "Quartas de final", "Semifinais", "Final"];

    function treeBuildNode(id) {
      const m = findKnockoutMatch(id);
      if (id >= 73 && id <= 88) return { id, leaf: true };
      return { id, children: [treeBuildNode(+m.home.slice(1)), treeBuildNode(+m.away.slice(1))] };
    }

    function renderTreeBracket() {
      const wrap = document.getElementById("bracket-tree");
      if (!wrap) return;

      const root = treeBuildNode(104);
      const colX = (col) => TREE_PAD + col * (TREE_COL_W + TREE_COL_GAP);

      // Atribui profundidade (final=0) e posição vertical: folhas em passo fixo,
      // cada nó interno no meio dos dois filhos.
      let leafIdx = 0;
      const nodes = [];
      (function assign(node) {
        if (node.leaf) {
          node.depth = 4;
          node.y = TREE_HEAD_H + TREE_PAD + leafIdx * TREE_ROW_PITCH + TREE_ROW_PITCH / 2;
          leafIdx++;
        } else {
          node.children.forEach(assign);
          node.depth = node.children[0].depth - 1;
          node.y = (node.children[0].y + node.children[1].y) / 2;
        }
        node.col = 4 - node.depth;
        node.x = colX(node.col);
        nodes.push(node);
      })(root);

      const totalH = TREE_HEAD_H + TREE_PAD + 16 * TREE_ROW_PITCH + TREE_PAD;
      // Campeão fica acima da final (na própria coluna da final), então a árvore
      // tem só 5 colunas — cabe na tela/PNG sem esticar pra direita.
      const totalW = colX(4) + TREE_COL_W + TREE_PAD;

      // Conectores em cotovelo (filho -> pai) + linha pontilhada final -> campeão.
      let linesSvg = "";
      for (const n of nodes) {
        if (n.leaf) continue;
        for (const c of n.children) {
          const x1 = c.x + TREE_COL_W, y1 = c.y;
          const midX = x1 + TREE_COL_GAP / 2;
          linesSvg += `<path d="M${x1} ${y1} H${midX} V${n.y} H${n.x}"/>`;
        }
      }

      // Cards editáveis, posicionados em (x, y) com centro vertical em y.
      const cardsHtml = nodes.map((n) => {
        const m = findKnockoutMatch(n.id);
        return `<div class="tree-node" style="left:${n.x}px;top:${n.y}px;width:${TREE_COL_W}px">${renderKoMatch(m)}</div>`;
      }).join("");

      // Disputa do 3º lugar: confronto solto (não entra na árvore principal),
      // posicionado abaixo da final.
      const thirdY = root.y + 210;
      const thirdHtml =
        `<div class="tree-head" style="left:${colX(4)}px;top:${thirdY - TREE_ROW_PITCH / 2 - 6}px;width:${TREE_COL_W}px">Disputa do 3º Lugar</div>` +
        `<div class="tree-node" style="left:${colX(4)}px;top:${thirdY}px;width:${TREE_COL_W}px">${renderKoMatch(KO_3RD)}</div>`;

      // Campeão acima da final, na mesma coluna. Conector vertical tracejado
      // ligando o topo da final à base da caixa do campeão.
      const champion = getKnockoutOutcome(104, "winner");
      const champCx = colX(4) + TREE_COL_W / 2;
      const champCy = root.y - 168;
      const champLeft = colX(4) + (TREE_COL_W - TREE_CHAMP_W) / 2;
      linesSvg += `<path class="tree-line-dash" d="M${champCx} ${root.y - 64} V${champCy + 44}"/>`;
      const champHtml = `
        <div class="tree-champ ${champion ? "" : "empty"}" style="left:${champLeft}px;top:${champCy}px;width:${TREE_CHAMP_W}px">
          <div class="trophy">🏆</div>
          <div class="champ-label">Campeão</div>
          <div class="champ-team">${champion ? `<span class="flag">${champion.flag}</span>${escapeHtml(champion.name)}` : "—"}</div>
        </div>`;

      const headsHtml = TREE_TITLES.map((t, col) =>
        `<div class="tree-head" style="left:${colX(col)}px;top:${TREE_PAD}px;width:${TREE_COL_W}px">${t}</div>`
      ).join("");

      wrap.style.height = totalH + "px";
      wrap.innerHTML = `
        <div class="tree-wrap" style="width:${totalW}px;height:${totalH}px">
          <svg class="tree-lines" width="${totalW}" height="${totalH}">
            <g fill="none" stroke="var(--border)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${linesSvg}</g>
          </svg>
          ${headsHtml}
          ${cardsHtml}
          ${thirdHtml}
          ${champHtml}
        </div>`;
    }

    // ---------- Bracket radial (chaveamento circular, só visual) ----------
    // Anéis do centro p/ fora: 0=campeão (troféu), 1=finalistas, 2=semi, 3=quartas,
    // 4=oitavas, 5=os 32 times dos 16-avos. Cada nó interno é o vencedor de um jogo
    // e fica um anel pra dentro dos seus dois participantes.
    const RADIAL_RING_R = [0, 14, 22, 30, 38, 46]; // % do raio por profundidade
    function radialRingDepth(id) {
      if (id === 104) return 0;
      if (id === 101 || id === 102) return 1;
      if (id >= 97 && id <= 100) return 2;
      if (id >= 89 && id <= 96) return 3;
      if (id >= 73 && id <= 88) return 4;
      return 5;
    }
    function radialBuildNode(id) {
      const m = findKnockoutMatch(id);
      if (id >= 73 && id <= 88) {
        return { id, children: [{ leaf: true, slot: m.home }, { leaf: true, slot: m.away }] };
      }
      return { id, children: [radialBuildNode(+m.home.slice(1)), radialBuildNode(+m.away.slice(1))] };
    }
    function radialPos(angleDeg, rPct) {
      const rad = (angleDeg * Math.PI) / 180;
      return [50 + rPct * Math.cos(rad), 50 + rPct * Math.sin(rad)];
    }
    const RADIAL_DISC = { 1: 0.096, 2: 0.086, 3: 0.078, 4: 0.070, 5: 0.064 };
    const RADIAL_FONT = { 1: 0.052, 2: 0.046, 3: 0.042, 4: 0.038, 5: 0.034 };
    const RADIAL_CHAMP_TROPHY_Y = 45;
    const RADIAL_CHAMP_FLAG_Y = 61;
    const EMOJI_FONT = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';

    // Calcula a geometria do chaveamento radial: nós (com posição x/y em %, anel,
    // time) e linhas conectoras [x1,y1,x2,y2] em %. Usado tanto pelo DOM quanto
    // pelo canvas de exportação.
    function computeRadialLayout() {
      const root = radialBuildNode(104);
      let leafIdx = 0;
      (function assign(node) {
        if (node.leaf) {
          node.depth = 5;
          node.angle = -90 + (leafIdx + 0.5) * (360 / 32);
          leafIdx++;
          return node.angle;
        }
        const a1 = assign(node.children[0]);
        const a2 = assign(node.children[1]);
        node.angle = (a1 + a2) / 2;
        node.depth = radialRingDepth(node.id);
        return node.angle;
      })(root);
      const nodes = [];
      const lines = [];
      (function walk(node) {
        const isLeaf = !!node.leaf;
        const r = RADIAL_RING_R[node.depth];
        const [x, y] = node.depth === 0 ? [50, 50] : radialPos(node.angle, r);
        node._x = x; node._y = y;
        const team = isLeaf ? resolveSlot(node.slot) : getKnockoutOutcome(node.id, "winner");
        nodes.push({ x, y, depth: node.depth, team, isChampion: node.id === 104, leaf: isLeaf });
        if (!isLeaf) {
          for (const c of node.children) { walk(c); lines.push([x, y, c._x, c._y]); }
        }
      })(root);
      return { nodes, lines };
    }

    function renderRadialBracket() {
      const wrap = document.getElementById("bracket-radial");
      if (!wrap) return;

      const { nodes, lines } = computeRadialLayout();
      const f = (n) => n.toFixed(2);
      const linesSvg = lines
        .map(([x1, y1, x2, y2]) =>
          `<line x1="${f(x1)}" y1="${f(y1)}" x2="${f(x2)}" y2="${f(y2)}"/>`)
        .join("");

      const S = Math.max(300, Math.min((window.innerWidth || 800) - 56, 700));
      const px = (frac) => (frac * S).toFixed(1) + "px";
      const DISC = RADIAL_DISC, FONT = RADIAL_FONT;
      const nodesHtml = nodes
        .filter(n => !n.isChampion) // o campeão é o troféu central
        .map(n => {
          const cls = n.team ? "radial-node" : "radial-node empty";
          const content = n.team ? `<span class="flag">${n.team.flag}</span>` : "";
          const title = n.team ? escapeHtml(n.team.name) : "";
          return `<div class="${cls}" title="${title}" style="left:${n.x.toFixed(2)}%;top:${n.y.toFixed(2)}%;width:${px(DISC[n.depth])};height:${px(DISC[n.depth])};font-size:${px(FONT[n.depth])}">${content}</div>`;
        })
        .join("");

      const champion = getKnockoutOutcome(104, "winner");
      // A taça fica sempre no centro; com campeão, sobe um pouco e a bandeira dele
      // aparece logo abaixo — assim o conjunto taça+bandeira fica centralizado.
      const trophyTop = champion ? RADIAL_CHAMP_TROPHY_Y : 50;
      const trophyHtml = `<div class="radial-center" style="top:${trophyTop}%;width:${px(0.24)};height:${px(0.24)}"><img class="rc-trophy-img" src="/trofeu-copa.png" alt="Taça da Copa do Mundo" style="height:${px(0.19)}"></div>`;
      const champHtml = champion
        ? `<div class="radial-node champ" title="${escapeHtml(champion.name)}" style="left:50%;top:${RADIAL_CHAMP_FLAG_Y}%;width:${px(0.1)};height:${px(0.1)};font-size:${px(0.052)}"><span class="flag">${champion.flag}</span></div>`
        : "";

      wrap.innerHTML = `
        <div class="radial-wrap" style="width:${S}px;height:${S}px">
          <svg class="radial-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
            <g fill="none" stroke="var(--border)" stroke-width="0.4" stroke-linecap="round" opacity="0.75">${linesSvg}</g>
          </svg>
          ${nodesHtml}
          ${trophyHtml}
          ${champHtml}
        </div>`;
    }

    // ---- Exportação do círculo via <canvas> próprio (html2canvas não desenha os
    // emoji de bandeira; aqui usamos fillText/drawImage, que funcionam de verdade) ----
    let _trophyImg = null;
    function loadTrophy() {
      if (_trophyImg) return Promise.resolve(_trophyImg);
      return new Promise((res) => {
        const im = new Image();
        im.onload = () => { _trophyImg = im; res(im); };
        im.onerror = () => res(null);
        im.src = "/trofeu-copa.png";
      });
    }
    // Desenha o chaveamento radial num canvas de lado `size` (px lógicos).
    async function radialToCanvas(size, dpr) {
      dpr = dpr || 2;
      const { nodes, lines } = computeRadialLayout();
      const canvas = document.createElement("canvas");
      canvas.width = size * dpr; canvas.height = size * dpr;
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      const P = (pct) => (pct / 100) * size;
      const c = size / 2;
      const champion = getKnockoutOutcome(104, "winner");
      const trophyCy = champion ? P(RADIAL_CHAMP_TROPHY_Y) : c;

      // fundo: disco branco + leve gradiente na borda + brilho dourado central
      ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.arc(c, c, c - 1, 0, Math.PI * 2); ctx.fill();
      const glow = ctx.createRadialGradient(c, trophyCy, 0, c, trophyCy, size * 0.16);
      glow.addColorStop(0, "rgba(255,226,138,0.85)");
      glow.addColorStop(1, "rgba(255,226,138,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(c, trophyCy, size * 0.16, 0, Math.PI * 2); ctx.fill();

      // linhas conectoras (sólidas, leves)
      ctx.strokeStyle = "#c9cfdd";
      ctx.lineWidth = Math.max(1, size * 0.0022);
      ctx.lineCap = "round";
      ctx.globalAlpha = 0.85;
      for (const [x1, y1, x2, y2] of lines) {
        ctx.beginPath(); ctx.moveTo(P(x1), P(y1)); ctx.lineTo(P(x2), P(y2)); ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // nós (discos + bandeira)
      for (const n of nodes) {
        if (n.isChampion) continue;
        const rad = (RADIAL_DISC[n.depth] * size) / 2;
        const cx = P(n.x), cy = P(n.y);
        ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI * 2);
        ctx.fillStyle = n.team ? "#ffffff" : "#f1f4fb";
        ctx.fill();
        ctx.lineWidth = Math.max(1, size * 0.0028);
        ctx.strokeStyle = "#cdd5e6";
        if (n.team) ctx.setLineDash([]);
        else ctx.setLineDash([size * 0.008, size * 0.006]);
        ctx.stroke(); ctx.setLineDash([]);
        if (n.team) {
          const fs = RADIAL_FONT[n.depth] * size;
          ctx.font = `${fs}px ${EMOJI_FONT}`;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(n.team.flag, cx, cy + fs * 0.04);
        }
      }

      // centro: a taça sempre; se houver campeão, a bandeira dele logo abaixo
      const tImg = await loadTrophy();
      if (tImg && tImg.width) {
        const th = 0.19 * size, tw = th * (tImg.width / tImg.height);
        ctx.drawImage(tImg, c - tw / 2, trophyCy - th / 2, tw, th);
      }
      if (champion) {
        const cy2 = P(RADIAL_CHAMP_FLAG_Y);
        const rad = (0.1 * size) / 2;
        ctx.beginPath(); ctx.arc(c, cy2, rad, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff"; ctx.fill();
        ctx.lineWidth = Math.max(2, size * 0.004); ctx.strokeStyle = "#ecc15a"; ctx.stroke();
        const fs = 0.052 * size;
        ctx.font = `${fs}px ${EMOJI_FONT}`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(champion.flag, c, cy2 + fs * 0.04);
      }
      return canvas;
    }

    function renderKoMatch(m) {
      const home = resolveSlot(m.home);
      const away = resolveSlot(m.away);
      const s = getKnockoutScore(m.id);
      const h = Number(s.home), a = Number(s.away);
      const finite = Number.isFinite(h) && Number.isFinite(a);
      const ph = Number(s.penHome), pa = Number(s.penAway);
      const penFinite = Number.isFinite(ph) && Number.isFinite(pa) && ph !== pa;
      const winnerSide =
        !finite ? null :
        h > a ? "home" :
        a > h ? "away" :
        penFinite ? (ph > pa ? "home" : "away") : null;
      const tied = finite && h === a;

      const homeLabel = home
        ? `<span class="flag">${home.flag}</span>${escapeHtml(home.name)}`
        : slotLabel(m.home);
      const awayLabel = away
        ? `<span class="flag">${away.flag}</span>${escapeHtml(away.name)}`
        : slotLabel(m.away);

      const labelTag = m.id === 103 ? "3º Lugar" : m.id === 104 ? "Final" : `Jogo ${m.id}`;
      const time = formatMatchTime(SCHEDULE[`ko-${m.id}`]);

      return `
        <div class="ko-match">
          <div class="ko-id">${labelTag}${time ? ` • <span style="text-transform:none;letter-spacing:0;">${time}</span>` : ""}</div>
          <div class="ko-row ${winnerSide === "home" ? "winner" : ""} ${!home ? "placeholder" : ""}">
            <span class="team-label">${homeLabel}</span>
            <input type="number" min="0" max="99" inputmode="numeric"
                   data-ko="${m.id}" data-side="home" value="${escapeHtml(s.home || "")}" />
          </div>
          <div class="ko-row ${winnerSide === "away" ? "winner" : ""} ${!away ? "placeholder" : ""}">
            <span class="team-label">${awayLabel}</span>
            <input type="number" min="0" max="99" inputmode="numeric"
                   data-ko="${m.id}" data-side="away" value="${escapeHtml(s.away || "")}" />
          </div>
          ${tied ? `
            <div class="ko-pens">
              <span>Pênaltis</span>
              <span class="flag">${home ? home.flag : ""}</span>
              <input type="number" min="0" max="20" inputmode="numeric"
                     data-ko="${m.id}" data-side="penHome" value="${escapeHtml(s.penHome || "")}" />
              <span class="vs">×</span>
              <input type="number" min="0" max="20" inputmode="numeric"
                     data-ko="${m.id}" data-side="penAway" value="${escapeHtml(s.penAway || "")}" />
              <span class="flag">${away ? away.flag : ""}</span>
            </div>` : ""}
        </div>
      `;
    }

    // ---------- Jogos do dia ----------

    function matchClock(utc) {
      if (!utc) return "";
      return new Date(utc).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    }
    // Dia local (do navegador) no formato YYYY-MM-DD, p/ comparar/ordenar.
    function localDayKey(d) {
      return new Date(d).toLocaleDateString("sv-SE");
    }
    function teamCell(t) {
      return `<span class="flag">${t.flag}</span><span class="tc-name">${escapeHtml(t.name)}</span>`;
    }
    function koSideCell(slot) {
      const r = resolveSlot(slot);
      if (r) return teamCell(r);
      return `<span class="tc-name tc-tbd">${escapeHtml(slotLabel(slot))}</span>`;
    }
    function koRoundLabel(id) {
      return id <= 88 ? "16-avos" : id <= 96 ? "Oitavas" : id <= 100 ? "Quartas"
           : id <= 102 ? "Semifinal" : id === 103 ? "3º Lugar" : "Final";
    }

    // Placar view-only no card: gols + (pênaltis) quando preenchidos.
    function scoreCell(goals, pen) {
      if (goals == null || goals === "") return "";
      const penTxt = (pen != null && pen !== "") ? `<span class="tc-pen">(${escapeHtml(pen)})</span>` : "";
      return `<span class="tc-score">${escapeHtml(goals)}${penTxt}</span>`;
    }

    // Todos os jogos (grupos + mata-mata) com data definida.
    function allDatedMatches() {
      const out = [];
      for (const g of Object.keys(GROUPS)) {
        const teams = GROUPS[g];
        MATCH_PAIRS.forEach((pair, i) => {
          const when = SCHEDULE[`${g}-${i}`];
          if (!when) return;
          const s = getGroupScore(g, i);
          const filled = s.home !== "" && s.away !== "";
          const winSide = !filled ? null : Number(s.home) > Number(s.away) ? "home" : Number(s.away) > Number(s.home) ? "away" : null;
          out.push({
            when, label: `Grupo ${g}`, jump: `g:${g}:${i}`,
            home: teamCell(teams[pair[0]]), away: teamCell(teams[pair[1]]),
            sHome: filled ? s.home : null, sAway: filled ? s.away : null, winSide,
          });
        });
      }
      for (const m of allKnockoutMatches()) {
        const when = SCHEDULE[`ko-${m.id}`];
        if (!when) continue;
        const s = getKnockoutScore(m.id);
        const filled = s.home !== "" && s.away !== "";
        const tied = filled && Number(s.home) === Number(s.away);
        const penFilled = tied && s.penHome !== "" && s.penAway !== "";
        const winSide = !filled ? null
          : Number(s.home) > Number(s.away) ? "home"
          : Number(s.away) > Number(s.home) ? "away"
          : penFilled ? (Number(s.penHome) > Number(s.penAway) ? "home" : "away") : null;
        out.push({
          when, label: koRoundLabel(m.id), jump: `ko:${m.id}`,
          home: koSideCell(m.home), away: koSideCell(m.away),
          sHome: filled ? s.home : null, sAway: filled ? s.away : null,
          penHome: penFilled ? s.penHome : null, penAway: penFilled ? s.penAway : null, winSide,
        });
      }
      return out;
    }

    // Dia em foco no painel (YYYY-MM-DD). null = usar o padrão (hoje / próximo).
    let viewDayKey = null;

    // Lista ordenada de dias que têm jogos.
    function matchDayKeys() {
      return [...new Set(allDatedMatches().map(m => localDayKey(m.when)))].sort();
    }

    function stepDay(delta) {
      const dayKeys = matchDayKeys();
      let idx = dayKeys.indexOf(viewDayKey);
      if (idx < 0) return;
      idx = Math.min(dayKeys.length - 1, Math.max(0, idx + delta));
      viewDayKey = dayKeys[idx];
      renderTodayMatches();
    }

    function renderTodayMatches() {
      const el = document.getElementById("today-matches");
      if (!el) return;
      const all = allDatedMatches();
      if (all.length === 0) {
        el.innerHTML = `<div class="tc-empty">Sem jogos no momento.</div>`;
        return;
      }
      const dayKeys = matchDayKeys();
      const todayKey = localDayKey(Date.now());
      // Foco padrão: hoje (se tiver jogo), senão o próximo dia futuro, senão o último.
      const todayTarget = dayKeys.includes(todayKey)
        ? todayKey
        : (dayKeys.find(k => k > todayKey) || dayKeys[dayKeys.length - 1]);
      if (viewDayKey == null || !dayKeys.includes(viewDayKey)) {
        viewDayKey = todayTarget;
      }
      const idx = dayKeys.indexOf(viewDayKey);
      const games = all
        .filter(m => localDayKey(m.when) === viewDayKey)
        .sort((a, b) => new Date(a.when) - new Date(b.when));

      const dDays = Math.round((new Date(viewDayKey) - new Date(todayKey)) / 86400000);
      const rel = dDays === 0 ? "Hoje" : dDays === 1 ? "Amanhã" : dDays === -1 ? "Ontem" : null;
      const dateLabel = new Date(games[0].when)
        .toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long" });
      const title = rel ? `${rel} — ${dateLabel}` : dateLabel;

      const heading = `
        <div class="tc-daynav">
          <button class="tc-today" data-day-home ${viewDayKey === todayTarget ? "disabled" : ""}>Hoje</button>
          <button class="tc-arrow" data-day-nav="-1" ${idx <= 0 ? "disabled" : ""} aria-label="Dia anterior">‹</button>
          <button class="tc-arrow" data-day-nav="1" ${idx >= dayKeys.length - 1 ? "disabled" : ""} aria-label="Próximo dia">›</button>
          <span class="tc-daylabel">${title}</span>
        </div>`;
      const cards = games.map(m => `
        <div class="today-card" data-jump="${m.jump}" role="button" tabindex="0" title="Ir para o jogo">
          <div class="tc-head">
            <span class="pill">${m.label}</span>
            <span class="tc-time">${matchClock(m.when)}</span>
          </div>
          <div class="tc-row ${m.winSide === "home" ? "tc-win" : ""}">${m.home}${scoreCell(m.sHome, m.penHome)}</div>
          <div class="tc-row ${m.winSide === "away" ? "tc-win" : ""}">${m.away}${scoreCell(m.sAway, m.penAway)}</div>
        </div>`).join("");
      el.innerHTML = heading + `<div class="today-grid">${cards}</div>`;
    }

    // Rola até a partida correspondente (linha do grupo ou card do mata-mata)
    // e dá um destaque rápido. `jump` = "g:<grupo>:<i>" ou "ko:<id>".
    function jumpToMatch(jump) {
      if (!jump) return;
      let el = null;
      if (jump.startsWith("g:")) {
        const [, g, i] = jump.split(":");
        const inp = document.querySelector(`input[data-group="${g}"][data-i="${i}"]`);
        el = inp ? inp.closest(".match-row") : null;
      } else if (jump.startsWith("ko:")) {
        const id = jump.slice(3);
        // O card do mata-mata aparece na árvore. Se estiver no círculo (ou em
        // qualquer outra visão), troca pra árvore antes de rolar/destacar.
        if (!state.ui || state.ui.bracketView !== "tree") setBracketView("tree");
        // Lista (oculta) e árvore compartilham data-ko; pega o card visível.
        const inputs = Array.from(document.querySelectorAll(`input[data-ko="${id}"]`));
        const inp = inputs.find((x) => x.offsetParent !== null) || inputs[0];
        el = inp ? inp.closest(".ko-match") : null;
      }
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      el.classList.remove("jump-flash");
      void el.offsetWidth; // força reinício da animação se já estava destacado
      el.classList.add("jump-flash");
    }

    document.getElementById("today-matches").addEventListener("click", (ev) => {
      const home = ev.target.closest("[data-day-home]");
      if (home) {
        if (!home.disabled) { viewDayKey = null; renderTodayMatches(); }
        return;
      }
      const arrow = ev.target.closest("[data-day-nav]");
      if (arrow) {
        if (!arrow.disabled) stepDay(Number(arrow.dataset.dayNav));
        return;
      }
      const card = ev.target.closest("[data-jump]");
      if (card) jumpToMatch(card.dataset.jump);
    });
    document.getElementById("today-matches").addEventListener("keydown", (ev) => {
      if (ev.key !== "Enter" && ev.key !== " ") return;
      const card = ev.target.closest("[data-jump]");
      if (card) { ev.preventDefault(); jumpToMatch(card.dataset.jump); }
    });

    // ---------- Simulador de caminho ----------

    let simTeam = null;  // "G:idx"
    let simPos = "1";    // "1" ou "2"

    function populateSimTeam() {
      const sel = document.getElementById("sim-team");
      if (!sel || sel.options.length) return;
      let html = `<option value="">— escolha um time —</option>`;
      for (const g of Object.keys(GROUPS)) {
        html += `<optgroup label="Grupo ${g}">`;
        GROUPS[g].forEach((t, idx) => {
          html += `<option value="${g}:${idx}">${t.flag} ${escapeHtml(t.name)}</option>`;
        });
        html += `</optgroup>`;
      }
      sel.innerHTML = html;
    }

    // Time eliminado na fase de grupos: grupo encerrado e 4º, ou 3º fora dos 8 melhores.
    function groupEliminated(name, g) {
      if (!isGroupComplete(g)) return false;
      const rank = computeStandings(g).findIndex((t) => t.name === name);
      if (rank === 3) return true;
      if (rank === 2) return !Object.values(thirdAssignmentCache || {}).includes(g);
      return false;
    }

    // Times que perderam algum jogo do mata-mata já decidido.
    function eliminatedInKnockout() {
      const set = new Set();
      for (const m of allKnockoutMatches()) {
        const loser = getKnockoutOutcome(m.id, "loser");
        if (loser) set.add(loser.name);
      }
      return set;
    }

    function isTeamEliminated(name, g, koOut) {
      return groupEliminated(name, g) || (koOut || eliminatedInKnockout()).has(name);
    }

    // Desabilita no dropdown os times que já não podem chegar à final.
    function updateSimTeamOptions() {
      const sel = document.getElementById("sim-team");
      if (!sel) return;
      const koOut = eliminatedInKnockout();
      for (const opt of sel.options) {
        if (!opt.value) continue;
        const [g, idxStr] = opt.value.split(":");
        const t = GROUPS[g][parseInt(idxStr)];
        const elim = isTeamEliminated(t.name, g, koOut);
        opt.disabled = elim;
        opt.textContent = `${t.flag} ${t.name}${elim ? " (eliminado)" : ""}`;
      }
    }

    function syncPosButtons() {
      document.querySelectorAll("#sim-pos button").forEach((b) =>
        b.classList.toggle("active", b.dataset.pos === simPos));
    }

    // Times que ainda podem ocupar um slot (considerando jogos já decididos).
    // "W<id>" decidido -> só o vencedor; senão expande a subárvore até as folhas.
    function possibleTeams(token) {
      if (token.startsWith("W") || token.startsWith("L")) {
        const r = resolveSlot(token);
        if (r) return [r];
        const m = findKnockoutMatch(parseInt(token.slice(1)));
        return [...possibleTeams(m.home), ...possibleTeams(m.away)];
      }
      const r = resolveSlot(token);
      return r ? [r] : [{ label: slotLabel(token) }];
    }

    function teamSpan(o) {
      return o.name
        ? `<span class="sim-team-in"><span class="flag">${o.flag}</span>${escapeHtml(o.name)}</span>`
        : `<span class="sim-team-in sim-chip-slot">${escapeHtml(o.label)}</span>`;
    }

    // Agrupa os possíveis adversários POR CONFRONTO (quem joga contra quem),
    // colapsando jogos já decididos. Cada grupo vira uma caixinha "A ou B".
    function opponentMatchups(token) {
      if (token.startsWith("W") || token.startsWith("L")) {
        const resolved = resolveSlot(token);
        if (resolved) return [[resolved]];            // jogo decidido: 1 time
        const m = findKnockoutMatch(parseInt(token.slice(1)));
        if (m.id >= 73 && m.id <= 88) {               // confronto de 16-avos: os 2 lados
          return [[...possibleTeams(m.home), ...possibleTeams(m.away)]];
        }
        return [...opponentMatchups(m.home), ...opponentMatchups(m.away)];
      }
      return [[...possibleTeams(token)]];             // adversário único (folha de grupo)
    }

    // Caminho do slot de entrada até a final: adversário (subárvore) por rodada.
    function pathToFinal(entrySlot) {
      const rounds = [
        { name: "16-avos de final", matches: KO_R32 },
        { name: "Oitavas de final", matches: KO_R16 },
        { name: "Quartas de final", matches: KO_QF },
        { name: "Semifinal", matches: KO_SF },
        { name: "Final", matches: [KO_FINAL] },
      ];
      const steps = [];
      let me = entrySlot;
      for (const round of rounds) {
        const m = round.matches.find((x) => x.home === me || x.away === me);
        if (!m) break;
        const opp = m.home === me ? m.away : m.home;
        steps.push({ round: round.name, opponent: opp });
        me = `W${m.id}`;
      }
      return steps;
    }

    function renderSimulator() {
      populateSimTeam();
      updateSimTeamOptions();
      const host = document.getElementById("sim-path");
      if (!host) return;
      if (!simTeam) {
        host.innerHTML = `<div class="sim-empty">Escolha um time para ver os possíveis adversários até a final.</div>`;
        return;
      }
      const [g, idxStr] = simTeam.split(":");
      const team = GROUPS[g][parseInt(idxStr)];
      syncPosButtons();

      if (isTeamEliminated(team.name, g)) {
        host.innerHTML = `<div class="sim-empty">${escapeHtml(team.name)} foi eliminado e não tem mais caminho até a final.</div>`;
        return;
      }

      const entry = `${simPos}${g}`;
      const posTxt = `${simPos}º do Grupo ${g}`;
      const rowsHtml = pathToFinal(entry).map((step) => {
        const groups = opponentMatchups(step.opponent).map((grp) =>
          `<div class="sim-matchup">${grp.map(teamSpan).join('<span class="sim-ou">ou</span>')}</div>`
        ).join("");
        return `
          <div class="sim-round">
            <div class="sim-round-name">${step.round}</div>
            <div class="sim-matchups">${groups}</div>
          </div>`;
      }).join("");
      host.innerHTML = `
        <div class="sim-head">Caminho de <strong>${escapeHtml(team.name)}</strong> como ${posTxt}.</div>
        ${rowsHtml}`;
    }

    function renderAll() {
      renderGroups();
      renderThirdPlace();
      renderBracket();
      renderTodayMatches();
      renderSimulator();
    }

    // ---------- Events ----------

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.toggle("active", b === btn));
        document.getElementById("tab-painel").hidden = tab !== "painel";
        document.getElementById("tab-sim").hidden = tab !== "sim";
        if (tab === "sim") renderSimulator();
        window.scrollTo(0, 0);
      });
    });

    document.getElementById("sim-team").addEventListener("change", (ev) => {
      simTeam = ev.target.value || null;
      if (simTeam) {
        const [g, idxStr] = simTeam.split(":");
        const name = GROUPS[g][parseInt(idxStr)].name;
        // Default = posição atual no grupo (real se o grupo já acabou); dá pra trocar.
        const rank = computeStandings(g).findIndex((r) => r.name === name);
        simPos = rank === 1 ? "2" : "1";
        syncPosButtons();
      }
      renderSimulator();
    });
    document.querySelectorAll("#sim-pos button").forEach((btn) => {
      btn.addEventListener("click", () => {
        simPos = btn.dataset.pos;
        syncPosButtons();
        renderSimulator();
      });
    });

    document.addEventListener("input", (ev) => {
      const t = ev.target;
      if (!(t instanceof HTMLInputElement) || t.type !== "number") return;
      // Group input
      if (t.dataset.group) {
        const groupId = t.dataset.group;
        const i = Number(t.dataset.i);
        const side = t.dataset.side;
        const sibling = document.querySelector(
          `input[data-group="${groupId}"][data-i="${i}"][data-side="${side === "home" ? "away" : "home"}"]`
        );
        const home = side === "home" ? t.value : sibling.value;
        const away = side === "away" ? t.value : sibling.value;
        setGroupScore(groupId, i, home.trim(), away.trim());
        return;
      }
      // Knockout input
      if (t.dataset.ko) {
        const id = Number(t.dataset.ko);
        const side = t.dataset.side;
        if (side === "home" || side === "away") {
          const other = side === "home" ? "away" : "home";
          const sibling = document.querySelector(`input[data-ko="${id}"][data-side="${other}"]`);
          const patch = {};
          patch[side] = t.value.trim();
          patch[other] = (sibling?.value || "").trim();
          setKnockoutScore(id, patch);
        } else if (side === "penHome" || side === "penAway") {
          const other = side === "penHome" ? "penAway" : "penHome";
          const sibling = document.querySelector(`input[data-ko="${id}"][data-side="${other}"]`);
          const patch = {};
          patch[side] = t.value.trim();
          patch[other] = (sibling?.value || "").trim();
          setKnockoutScore(id, patch);
        }
        return;
      }
    });

    document.getElementById("reset-btn").addEventListener("click", async () => {
      if (!confirm("Apagar todos os resultados preenchidos?")) return;
      state = { groups: {}, ko: {}, ui: state.ui || { collapsed: [] } };
      try { await postState(state); flashStatus("Resetado"); }
      catch { flashStatus("Erro ao salvar"); }
      renderAll();
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      if (!confirm("Sair e entrar com outro usuário?")) return;
      logout();
    });

    function loadHtml2Canvas() {
      if (window.html2canvas) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("falha ao baixar html2canvas (precisa de internet na 1ª vez)"));
        document.head.appendChild(s);
      });
    }

    // html2canvas não renderiza o `value` de <input>. Trocamos temporariamente
    // por <span> com a mesma largura/estilo durante a captura.
    function inputsToSpans(root) {
      const restores = [];
      root.querySelectorAll("input[type='number'], input[type='text']").forEach((inp) => {
        const cs = getComputedStyle(inp);
        const span = document.createElement("span");
        span.textContent = inp.value || "";
        span.style.display = "inline-flex";
        span.style.alignItems = "center";
        span.style.justifyContent = cs.textAlign === "left" ? "flex-start" : (cs.textAlign === "right" ? "flex-end" : "center");
        span.style.width = cs.width;
        span.style.height = cs.height;
        span.style.padding = cs.padding;
        span.style.border = cs.border;
        span.style.borderRadius = cs.borderRadius;
        span.style.background = cs.backgroundColor;
        span.style.color = cs.color;
        span.style.font = cs.font;
        span.style.boxSizing = cs.boxSizing;
        span.style.verticalAlign = "middle";
        inp.parentNode.insertBefore(span, inp);
        inp.style.display = "none";
        restores.push(() => { inp.style.display = ""; span.remove(); });
      });
      return () => restores.forEach((fn) => fn());
    }

    document.getElementById("png-btn").addEventListener("click", async () => {
      const btn = document.getElementById("png-btn");
      const original = btn.textContent;
      btn.textContent = "Gerando…";
      btn.disabled = true;

      const toolbar = document.querySelector(".toolbar");
      const status = document.getElementById("status");
      const prevToolbar = toolbar.style.visibility;
      const prevStatus = status.style.visibility;
      toolbar.style.visibility = "hidden";
      status.style.visibility = "hidden";

      // O PNG sempre captura o Painel (mesmo se a aba ativa for o Simulador).
      const painelEl = document.getElementById("tab-painel");
      const simEl = document.getElementById("tab-sim");
      const prevPainelHidden = painelEl.hidden, prevSimHidden = simEl.hidden;
      painelEl.hidden = false;
      simEl.hidden = true;

      // A seção "Jogos do dia" não entra no PNG (display:none pra não deixar lacuna).
      const todayEls = [document.getElementById("today-title"), document.getElementById("today-matches")];
      const prevTodayDisplay = todayEls.map((el) => (el ? el.style.display : null));
      todayEls.forEach((el) => { if (el) el.style.display = "none"; });

      // Neutraliza o gradiente decorativo do body/html durante a captura
      // (caso contrário, na altura total da página, o gradiente do topo
      // contrasta com a cor base sólida e gera uma faixa "mais escura").
      const FLAT_BG = "#ffffff";
      const prevBodyBg = document.body.style.background;
      const prevHtmlBg = document.documentElement.style.background;
      document.body.style.background = FLAT_BG;
      document.documentElement.style.background = FLAT_BG;

      const restoreInputs = inputsToSpans(document.body);
      const prevScrollY = window.scrollY;
      window.scrollTo(0, 0);
      let treeRestore = null;
      try {
        await loadHtml2Canvas();
        const SCALE = 2;
        // A visão em árvore tem scroll horizontal próprio; soltamos o overflow e
        // fixamos a largura no conteúdo pra que as colunas da direita (final,
        // campeão) entrem no PNG — senão o html2canvas corta o que está fora.
        const treeContainer = document.getElementById("bracket-tree");
        if (treeContainer && !treeContainer.hidden) {
          const prevOverflow = treeContainer.style.overflow;
          const prevWidth = treeContainer.style.width;
          const innerW = treeContainer.firstElementChild
            ? treeContainer.firstElementChild.offsetWidth : treeContainer.scrollWidth;
          treeContainer.style.overflow = "visible";
          treeContainer.style.width = innerW + "px";
          // O conteúdo fica num <main> com max-width + margin auto. A árvore é mais
          // larga que ele e transborda; com o html2canvas usando windowWidth maior,
          // o margin auto recentraliza e empurra a árvore pra fora (corta a direita).
          // Desligamos max-width/centralização durante a captura.
          const mainEl = document.querySelector("main");
          const prevMaxW = mainEl ? mainEl.style.maxWidth : null;
          const prevMargin = mainEl ? mainEl.style.margin : null;
          if (mainEl) { mainEl.style.maxWidth = "none"; mainEl.style.margin = "0"; }
          treeRestore = () => {
            treeContainer.style.overflow = prevOverflow;
            treeContainer.style.width = prevWidth;
            if (mainEl) { mainEl.style.maxWidth = prevMaxW; mainEl.style.margin = prevMargin; }
          };
        }
        // Se a visão em círculo estiver ativa e visível, guardamos a posição do
        // .radial-wrap e omitimos o DOM dele no clone do html2canvas; depois
        // desenhamos nosso canvas limpo por cima. Isso evita render duplicado.
        let radialRect = null;
        const radialContainer = document.getElementById("bracket-radial");
        if (radialContainer && !radialContainer.hidden) {
          const wrap = radialContainer.querySelector(".radial-wrap");
          if (wrap) {
            const r = wrap.getBoundingClientRect();
            radialRect = { x: r.left + window.scrollX, y: r.top + window.scrollY, size: wrap.offsetWidth };
          }
        }
        const exportWidth = Math.max(
          document.documentElement.scrollWidth,
          document.body.scrollWidth,
          document.documentElement.offsetWidth,
          document.body.offsetWidth
        );
        const radialExportBottom = radialRect ? radialRect.y + radialRect.size + 72 : 0;
        const exportHeight = Math.max(
          document.documentElement.scrollHeight,
          document.body.scrollHeight,
          document.documentElement.offsetHeight,
          document.body.offsetHeight,
          radialExportBottom
        );
        const canvas = await window.html2canvas(document.body, {
          backgroundColor: FLAT_BG,
          scale: SCALE,
          useCORS: true,
          scrollX: 0,
          scrollY: 0,
          windowWidth: exportWidth,
          windowHeight: exportHeight,
          width: exportWidth,
          height: exportHeight,
          onclone: (doc) => {
            const cloneWrap = doc.querySelector("#bracket-radial .radial-wrap");
            if (cloneWrap) cloneWrap.style.visibility = "hidden";
          },
        });
        if (radialRect) {
          const circle = await radialToCanvas(radialRect.size, SCALE);
          const ctx2 = canvas.getContext("2d");
          // O html2canvas deixa um scale(devicePixelRatio) na matriz do contexto;
          // sem resetar, nosso drawImage sairia multiplicado e o círculo iria parar
          // fora do canvas (sumindo ou cortado). Voltamos pra identidade antes.
          ctx2.setTransform(1, 0, 0, 1, 0, 0);
          ctx2.drawImage(
            circle,
            radialRect.x * SCALE,
            radialRect.y * SCALE,
            radialRect.size * SCALE,
            radialRect.size * SCALE
          );
        }
        const dataUrl = canvas.toDataURL("image/png");
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = `copa-2026-${new Date().toISOString().slice(0,10)}.png`;
        a.click();
      } catch (e) {
        alert("Falha ao gerar PNG: " + e.message);
      } finally {
        if (treeRestore) treeRestore();
        restoreInputs();
        document.body.style.background = prevBodyBg;
        document.documentElement.style.background = prevHtmlBg;
        toolbar.style.visibility = prevToolbar;
        status.style.visibility = prevStatus;
        todayEls.forEach((el, i) => { if (el) el.style.display = prevTodayDisplay[i]; });
        painelEl.hidden = prevPainelHidden;
        simEl.hidden = prevSimHidden;
        window.scrollTo(0, prevScrollY);
        btn.textContent = original;
        btn.disabled = false;
      }
    });

    function flashStatus(text) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.classList.add("show");
      clearTimeout(flashStatus._t);
      flashStatus._t = setTimeout(() => el.classList.remove("show"), 900);
    }

    (async () => {
      try {
        const loaded = await fetchState();
        const loadedCollapsed = loaded && loaded.ui && Array.isArray(loaded.ui.collapsed)
          ? loaded.ui.collapsed : [];
        const savedView = loaded && loaded.ui && loaded.ui.bracketView;
        const loadedView = savedView === "circle" ? "circle" : "tree";
        state = {
          groups: (loaded && loaded.groups) || {},
          ko: (loaded && loaded.ko) || {},
          ui: { collapsed: loadedCollapsed, bracketView: loadedView },
        };
      } catch (e) {
        alert("Não foi possível carregar os dados do servidor. Tente recarregar a página.");
      }
      renderAll();
      applyBracketView(state.ui && state.ui.bracketView);
    })();
  </script>
</body>
</html>

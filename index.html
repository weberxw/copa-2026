<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <title>Copa do Mundo 2026</title>
  <style>
    :root {
      --bg: #f1f4fb;
      --surface: #ffffff;
      --surface-2: #f5f7fc;
      --border: #d7dcec;
      --text: #1d2748;
      --muted: #6b75a3;
      --accent: #3a59cf;
      --accent-2: #16a86d;
      --warn: #d9852b;
      --danger: #c93151;
      --shadow: 0 6px 20px rgba(31, 45, 96, 0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(1200px 600px at 10% -10%, #dde6fa 0%, transparent 60%),
                  radial-gradient(900px 500px at 110% 10%, #e6ecfb 0%, transparent 60%),
                  var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 28px 24px 8px;
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 26px; letter-spacing: 0.2px; }
    header .sub { color: var(--muted); font-size: 14px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .user-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
    }

    /* ---------- Abas ---------- */
    .tabs { display: flex; gap: 4px; margin: 4px 0 4px; border-bottom: 1px solid var(--border); }
    .tab-btn {
      background: transparent; border: none; border-bottom: 2px solid transparent;
      border-radius: 0; color: var(--muted); padding: 10px 18px; cursor: pointer;
      font-size: 15px; font-weight: 600;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ---------- Simulador de caminho ---------- */
    .sim-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 0 4px 16px; }
    #sim-team {
      padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 15px; min-width: 240px;
    }
    #sim-pos { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    #sim-pos button {
      background: var(--surface); border: none; border-radius: 0; color: var(--muted);
      padding: 9px 16px; cursor: pointer; font-size: 14px; font-weight: 600;
    }
    #sim-pos button.active { background: var(--accent); color: #fff; }
    .sim-head { color: var(--muted); font-size: 15px; margin: 0 4px 14px; }
    .sim-round {
      display: flex; gap: 14px; align-items: baseline;
      padding: 12px 4px; border-bottom: 1px dashed var(--border);
    }
    .sim-round-name { flex: 0 0 150px; color: var(--accent); font-weight: 600; font-size: 14px; }
    .sim-matchups { display: flex; flex-wrap: wrap; gap: 10px; }
    .sim-matchup {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 14px;
    }
    .sim-team-in { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; }
    .sim-ou { color: var(--muted); font-size: 11px; font-style: italic; text-transform: uppercase; letter-spacing: .5px; }
    .sim-chip-slot { color: var(--muted); font-style: italic; }
    .sim-empty { color: var(--muted); font-size: 15px; padding: 8px 4px; }
    button, .btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s, border-color .15s, transform .05s;
    }
    button:hover { background: #eaeffb; border-color: #b8c3e3; }
    button:active { transform: translateY(1px); }
    button.danger { color: var(--danger); border-color: #efc4cf; }

    main { max-width: 1500px; margin: 0 auto; padding: 16px 24px 48px; }

    .phase-title {
      font-size: 14px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 28px 4px 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    /* Seções colapsáveis */
    [data-collapse-id] { cursor: pointer; user-select: none; }
    [data-collapse-id] .chevron {
      display: inline-block;
      width: 1.1em;
      margin-right: 6px;
      font-size: 1.25em;
      line-height: 1;
      color: var(--muted);
      transition: transform .15s;
    }
    [data-collapse-id].collapsed .chevron { transform: rotate(-90deg); }
    [data-collapse-id].collapsed + * { display: none !important; }

    /* ---------- Jogos do dia ---------- */
    .tc-daynav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 4px 12px;
    }
    .tc-daylabel {
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      text-transform: capitalize;
      margin-left: 4px;
    }
    .tc-arrow {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      width: 30px;
      height: 30px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .tc-arrow:hover:not(:disabled) { border-color: var(--accent); background: var(--surface-2); }
    .tc-arrow:disabled { opacity: .35; cursor: default; }
    .tc-today {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      height: 30px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      transition: border-color .15s, background .15s;
    }
    .tc-today:hover:not(:disabled) { border-color: var(--accent); background: var(--surface-2); }
    .tc-today:disabled { opacity: .35; cursor: default; }
    .today-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .today-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, transform .15s, box-shadow .15s;
    }
    .today-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 2px 10px rgba(58, 89, 207, .12);
    }
    .today-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Destaque ao chegar na partida clicada */
    .jump-flash { animation: jumpFlash 2.6s ease-out; }
    @keyframes jumpFlash {
      0%, 25% { outline: 2px solid var(--accent); outline-offset: 3px; }
      100% { outline: 2px solid rgba(58, 89, 207, 0); outline-offset: 3px; }
    }
    .today-card .tc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .today-card .pill {
      background: var(--surface-2);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .3px;
    }
    .today-card .tc-time {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .today-card .tc-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 15px;
      color: var(--text);
    }
    .today-card .tc-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .today-card .tc-tbd { color: var(--muted); font-size: 13px; }
    .today-card .tc-score {
      margin-left: auto;
      padding-left: 8px;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--text);
    }
    .today-card .tc-pen { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 3px; }
    .today-card .tc-row.tc-win .tc-name { font-weight: 700; }
    .tc-empty { color: var(--muted); font-size: 14px; padding: 4px; }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
    }

    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
      box-shadow: var(--shadow);
    }
    .group h2 {
      margin: 0 0 10px;
      font-size: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .group h2 .pill {
      background: var(--surface-2);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    table.standings, table.third-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.standings th, table.standings td,
    table.third-table th, table.third-table td {
      text-align: center;
      padding: 6px 4px;
      border-bottom: 1px dashed #e0e5f2;
    }
    table.standings th, table.third-table th {
      color: var(--muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    table.standings td.team, table.third-table td.team {
      text-align: left;
      font-weight: 500;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table.standings td.pts, table.third-table td.pts {
      font-weight: 700;
      color: var(--accent);
    }
    .flag {
      display: inline-block;
      margin-right: 6px;
      font-size: 15px;
      line-height: 1;
      vertical-align: -1px;
    }

    table.standings tr.qualified td,
    table.third-table tr.qualified td { background: #e7f3ed; }
    table.third-table tr.cutoff td {
      border-bottom: 2px solid var(--accent-2);
    }
    table.third-table .pos { color: var(--muted); font-size: 11px; width: 28px; }
    table.third-table .grp { color: var(--muted); font-size: 11px; width: 28px; }

    .matches { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .match-row { display: flex; flex-direction: column; gap: 2px; }
    .match-time {
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.3px;
      padding-left: 2px;
    }
    .match {
      display: grid;
      grid-template-columns: 1fr 40px auto 40px 1fr;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 8px;
    }
    .match .home, .match .away { color: var(--text); }
    .match .home { text-align: right; }
    .match .away { text-align: left; }
    .match .team-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .match input[type="number"],
    .ko-match input[type="number"] {
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 4px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      -moz-appearance: textfield;
    }
    .match input[type="number"] { width: 40px; }
    .ko-match input[type="number"] { width: 38px; }
    .match input[type="number"]::-webkit-outer-spin-button,
    .match input[type="number"]::-webkit-inner-spin-button,
    .ko-match input[type="number"]::-webkit-outer-spin-button,
    .ko-match input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .match input:focus, .ko-match input:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
    }
    .match .vs { color: var(--muted); font-size: 11px; text-align: center; }

    /* Bracket */
    .bracket {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .bracket-round h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.9px;
      font-weight: 600;
    }
    .bracket-round .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }

    /* Cabeçalho de fase com ação à direita */
    .phase-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      margin: 28px 4px 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .phase-head .phase-title { margin: 0; border: 0; padding: 0; }

    /* Alternador Lista / Círculo (só ícones) */
    .view-toggle {
      display: inline-flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-2);
      padding: 3px;
      flex: none;
    }
    .view-toggle button {
      border: none;
      background: transparent;
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .view-toggle button svg { width: 16px; height: 16px; display: block; }
    .view-toggle button:hover { background: transparent; color: var(--text); }
    .view-toggle button.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow);
    }

    /* Bracket em árvore (chaveamento horizontal) */
    #bracket-tree { overflow-x: auto; overflow-y: hidden; padding: 2px 2px 10px; }
    .tree-wrap { position: relative; }
    .tree-wrap svg.tree-lines {
      position: absolute; inset: 0; pointer-events: none; overflow: visible;
    }
    .tree-wrap svg .tree-line-dash { stroke-dasharray: 4 5; opacity: 0.8; }
    .tree-head {
      position: absolute;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      text-align: center;
    }
    .tree-node {
      position: absolute;
      transform: translateY(-50%);
    }
    .tree-node .ko-match { width: 100%; box-sizing: border-box; margin: 0; }
    .tree-champ {
      position: absolute;
      transform: translateY(-50%);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 12px 14px;
      border: 1px solid #ecc15a;
      border-radius: 12px;
      background: linear-gradient(180deg, #fffdf4, #fff3cf);
      box-shadow: 0 0 0 3px rgba(236, 193, 90, 0.28), var(--shadow);
      text-align: center;
    }
    .tree-champ .trophy { font-size: 26px; line-height: 1; }
    .tree-champ .champ-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: #b8862b; font-weight: 700;
    }
    .tree-champ .champ-team { font-size: 13px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.3; }
    .tree-champ.empty { opacity: 0.7; }

    /* Bracket radial (chaveamento circular) */
    .radial-wrap {
      position: relative;
      margin: 8px 0 0 4px;
      background: radial-gradient(circle at 50% 50%, #fffdf4 0%, #fff8df 9%, var(--surface) 24%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: 50%;
      box-shadow: var(--shadow);
    }
    .radial-wrap svg.radial-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .radial-node {
      position: absolute;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(20, 30, 60, 0.14);
      line-height: 1;
      overflow: hidden;
    }
    .radial-node .flag { margin: 0; font-size: inherit; line-height: 1; vertical-align: 0; }
    .radial-node.empty { background: var(--surface-2); border-style: dashed; opacity: 0.7; }
    .radial-node.champ {
      border-color: #ecc15a;
      box-shadow: 0 0 0 3px rgba(236, 193, 90, 0.45), 0 4px 12px rgba(236, 193, 90, 0.4);
      z-index: 3;
    }
    .radial-center {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 226, 138, 0.85) 0%, rgba(255, 226, 138, 0) 68%);
      z-index: 2;
      pointer-events: none;
    }
    .radial-center .rc-trophy-img {
      width: auto;
      filter: drop-shadow(0 3px 6px rgba(150, 110, 30, 0.4));
    }

    /* Final + trophy */
    .bracket-round.final-round .matches-grid {
      grid-template-columns: minmax(280px, 480px);
      justify-content: center;
    }
    .champion {
      margin-top: 20px;
      padding: 26px 24px;
      background: linear-gradient(180deg, #fff9e3, #fdedb6);
      border: 2px solid #ecc15a;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 14px 32px rgba(236, 193, 90, 0.28);
    }
    .champion .trophy {
      font-size: 56px;
      line-height: 1;
      filter: drop-shadow(0 6px 8px rgba(180, 130, 30, 0.35));
    }
    .champion-label {
      margin-top: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8a6300;
      font-weight: 700;
    }
    .champion-team {
      margin-top: 6px;
      font-size: 26px;
      font-weight: 700;
      color: #4f3700;
    }
    .champion-team .flag {
      font-size: 28px;
      margin-right: 10px;
      vertical-align: -3px;
    }
    .ko-match {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 13px;
      box-shadow: var(--shadow);
    }
    .ko-match .ko-id {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .ko-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }
    .ko-row .team-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ko-row.winner .team-label { color: var(--accent-2); font-weight: 600; }
    .ko-row.placeholder .team-label { color: var(--muted); font-style: italic; }
    .ko-pens {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .ko-pens input[type="number"] {
      width: 32px !important;
      padding: 3px 2px !important;
      font-size: 12px !important;
    }
    .ko-pens .vs { color: var(--muted); font-size: 11px; }

    .status {
      position: fixed;
      right: 16px; bottom: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    .status.show { opacity: 1; }

  </style>
</head>
<body>
  <header>
    <div>
      <h1>Copa do Mundo 2026</h1>
      <div class="sub">Preencha os placares manualmente.</div>
    </div>
    <div class="toolbar">
      <span id="user-chip" class="user-chip" hidden></span>
      <button id="logout-btn" hidden>Trocar usuário</button>
      <button id="png-btn">Exportar PNG</button>
      <button id="reset-btn" class="danger">Limpar tudo</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="painel">Painel</button>
    <button class="tab-btn" data-tab="sim">Simulador</button>
  </nav>

  <main>
    <div id="tab-painel">
    <h2 class="phase-title" id="today-title">Jogos do dia</h2>
    <div id="today-matches"></div>

    <h2 class="phase-title" data-collapse-id="groups"><span class="chevron">▾</span>Fase de Grupos</h2>
    <div class="collapse-body">
      <div id="groups" class="groups-grid"></div>

      <h2 class="phase-title">3º Colocados (8 melhores avançam)</h2>
      <div id="third-place"></div>
    </div>

    <div class="phase-head">
      <h2 class="phase-title">Mata-mata</h2>
      <div class="view-toggle" id="bracket-view-toggle">

    let state = { groups: {}, ko: {}, ui: { collapsed: [] } };
    let saveTimer = null;
